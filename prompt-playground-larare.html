<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prompt-labb för lärare åk 7–9</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue:    #2563eb;
      --blue-lt: #dbeafe;
      --green:   #16a34a;
      --green-lt:#dcfce7;
      --amber:   #d97706;
      --amber-lt:#fef3c7;
      --purple:  #7c3aed;
      --purple-lt:#ede9fe;
      --rose:    #e11d48;
      --rose-lt: #ffe4e6;
      --teal:    #0d9488;
      --teal-lt: #ccfbf1;
      --indigo:  #4338ca;
      --indigo-lt:#e0e7ff;
      --slate:   #475569;
      --bg:      #f1f5f9;
      --card:    #ffffff;
      --border:  #e2e8f0;
      --text:    #0f172a;
      --muted:   #64748b;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── HERO ── */
    .hero {
      background: linear-gradient(135deg, #1e3a8a 0%, #1d4ed8 40%, #7c3aed 100%);
      color: #fff;
      padding: 56px 24px 48px;
      text-align: center;
    }
    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,.15);
      border: 1px solid rgba(255,255,255,.25);
      border-radius: 999px;
      padding: 4px 14px;
      font-size: .8rem;
      font-weight: 600;
      letter-spacing: .05em;
      text-transform: uppercase;
      margin-bottom: 20px;
    }
    .hero h1 {
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      font-weight: 800;
      line-height: 1.2;
      margin-bottom: 16px;
    }
    .hero p {
      font-size: 1.1rem;
      opacity: .85;
      max-width: 580px;
      margin: 0 auto 28px;
      line-height: 1.6;
    }
    .stats {
      display: flex;
      justify-content: center;
      gap: 32px;
      flex-wrap: wrap;
    }
    .stat { text-align: center; }
    .stat-num { font-size: 1.9rem; font-weight: 800; }
    .stat-lbl { font-size: .78rem; opacity: .75; text-transform: uppercase; letter-spacing: .05em; }

    /* ── MAIN LAYOUT ── */
    .main { max-width: 1200px; margin: 0 auto; padding: 36px 20px 60px; }

    /* ── SEARCH + FILTERS ── */
    .toolbar {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px 24px;
      margin-bottom: 28px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .search-row { position: relative; }
    .search-row svg {
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      color: var(--muted); pointer-events: none;
    }
    #search {
      width: 100%;
      padding: 11px 14px 11px 42px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: .95rem;
      background: var(--bg);
      outline: none;
      transition: border-color .15s;
    }
    #search:focus { border-color: var(--blue); }

    .filter-row { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
    .filter-label { font-size: .8rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; margin-right: 4px; }

    .chip {
      padding: 5px 14px;
      border-radius: 999px;
      border: 1.5px solid var(--border);
      background: var(--card);
      font-size: .83rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .15s;
      color: var(--slate);
      white-space: nowrap;
    }
    .chip:hover { border-color: var(--blue); color: var(--blue); }
    .chip.active { background: var(--blue); border-color: var(--blue); color: #fff; }

    /* ── RESULT COUNT ── */
    .result-count {
      font-size: .88rem;
      color: var(--muted);
      margin-bottom: 18px;
    }
    .result-count span { font-weight: 700; color: var(--text); }

    /* ── GRID ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 20px;
    }

    /* ── CARD ── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      transition: box-shadow .2s, transform .2s;
    }
    .card:hover { box-shadow: 0 8px 32px rgba(0,0,0,.1); transform: translateY(-2px); }

    .card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
    .card-tags { display: flex; flex-wrap: wrap; gap: 6px; }
    .tag {
      padding: 3px 10px;
      border-radius: 999px;
      font-size: .72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .04em;
      white-space: nowrap;
    }
    .tag-subject {}
    .tag-diff {}

    /* difficulty colours */
    .diff-grund  { background: var(--green-lt);  color: var(--green);  }
    .diff-mellan { background: var(--amber-lt);  color: var(--amber);  }
    .diff-avance { background: var(--rose-lt);   color: var(--rose);   }

    /* subject colours */
    .subj-svenska   { background: var(--blue-lt);   color: var(--blue);   }
    .subj-matematik { background: var(--rose-lt);    color: var(--rose);   }
    .subj-so        { background: var(--amber-lt);   color: var(--amber);  }
    .subj-no        { background: var(--green-lt);   color: var(--green);  }
    .subj-engelska  { background: var(--indigo-lt);  color: var(--indigo); }
    .subj-bedömning { background: var(--purple-lt);  color: var(--purple); }
    .subj-planering { background: var(--teal-lt);    color: var(--teal);   }
    .subj-elevhälsa { background: #fce7f3;           color: #be185d;       }
    .subj-idrott    { background: #ecfdf5;           color: #065f46;       }
    .subj-bild      { background: #fff7ed;           color: #c2410c;       }
    .subj-musik     { background: #f0fdf4;           color: #166534;       }
    .subj-teknik    { background: var(--indigo-lt);  color: var(--indigo); }
    .subj-hem       { background: #fdf2f8;           color: #9d174d;       }

    .card h3 { font-size: 1rem; font-weight: 700; line-height: 1.4; }
    .card-desc { font-size: .88rem; color: var(--muted); line-height: 1.6; flex: 1; }

    .card-footer { display: flex; flex-direction: column; gap: 10px; }
    .prompt-preview {
      background: var(--bg);
      border-left: 3px solid var(--blue);
      border-radius: 0 8px 8px 0;
      padding: 10px 12px;
      font-size: .8rem;
      color: var(--slate);
      line-height: 1.55;
      font-style: italic;
      max-height: 90px;
      overflow: hidden;
      position: relative;
    }
    .prompt-preview::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 28px;
      background: linear-gradient(transparent, var(--bg));
    }

    .btn-copy {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      padding: 9px 16px;
      border-radius: 10px;
      border: none;
      background: var(--blue);
      color: #fff;
      font-size: .86rem;
      font-weight: 700;
      cursor: pointer;
      transition: background .15s, transform .1s;
    }
    .btn-copy:hover { background: #1d4ed8; }
    .btn-copy:active { transform: scale(.97); }
    .btn-copy.copied { background: var(--green); }

    .no-results {
      grid-column: 1/-1;
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }
    .no-results svg { opacity: .3; margin-bottom: 12px; }
    .no-results p { font-size: 1rem; }

    @media (max-width: 600px) {
      .stats { gap: 20px; }
      .hero { padding: 40px 16px 36px; }
      .main { padding: 24px 14px 48px; }
    }
  </style>
</head>
<body>

<!-- HERO -->
<header class="hero">
  <div class="hero-badge">
    <svg width="12" height="12" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg>
    Lgr22-anpassat • Åk 7–9
  </div>
  <h1>Prompt-labb för lärare<br>i grundskolans högstadium</h1>
  <p>Välkurerade AI-prompts för undervisning, bedömning och planering – anpassade till Lgr22 och svenska grundskolans åk 7–9.</p>
  <div class="stats">
    <div class="stat"><div class="stat-num" id="totalCount">50</div><div class="stat-lbl">Prompts</div></div>
    <div class="stat"><div class="stat-num">13</div><div class="stat-lbl">Ämnen</div></div>
    <div class="stat"><div class="stat-num">3</div><div class="stat-lbl">Nivåer</div></div>
  </div>
</header>

<!-- MAIN -->
<main class="main">
  <div class="toolbar">
    <div class="search-row">
      <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="search" placeholder="Sök prompt, ämne eller nyckelord…">
    </div>
    <div class="filter-row" id="subjectFilters">
      <span class="filter-label">Ämne</span>
      <button class="chip active" data-filter="subject" data-value="alla">Alla ämnen</button>
      <button class="chip" data-filter="subject" data-value="svenska">Svenska</button>
      <button class="chip" data-filter="subject" data-value="matematik">Matematik</button>
      <button class="chip" data-filter="subject" data-value="so">SO</button>
      <button class="chip" data-filter="subject" data-value="no">NO</button>
      <button class="chip" data-filter="subject" data-value="engelska">Engelska</button>
      <button class="chip" data-filter="subject" data-value="bedömning">Bedömning</button>
      <button class="chip" data-filter="subject" data-value="planering">Planering</button>
      <button class="chip" data-filter="subject" data-value="elevhälsa">Elevhälsa</button>
    </div>
    <div class="filter-row" id="diffFilters">
      <span class="filter-label">Nivå</span>
      <button class="chip active" data-filter="diff" data-value="alla">Alla nivåer</button>
      <button class="chip" data-filter="diff" data-value="grund">Grundnivå</button>
      <button class="chip" data-filter="diff" data-value="mellan">Mellannivå</button>
      <button class="chip" data-filter="diff" data-value="avance">Avancerad</button>
    </div>
  </div>

  <p class="result-count">Visar <span id="showCount">50</span> av <span id="ofCount">50</span> prompts</p>

  <div class="grid" id="grid"></div>
</main>

<script>
const prompts = [
  // ── SVENSKA ──
  {
    subject: "svenska",
    diff: "grund",
    title: "Skapa en lättläst förklaring av ett litterärt begrepp",
    desc: "Generera en elevvänlig förklaring av ett litterärt begrepp med exempel från populärkultur som elever i åk 7 känner igen.",
    prompt: "Du är en erfaren SVA-lärare för åk 7. Förklara begreppet [BEGREPP] på ett lättillgängligt sätt med minst två exempel från film, serier eller böcker som tonåringar känner till. Avsluta med en enkel övningsfråga."
  },
  {
    subject: "svenska",
    diff: "grund",
    title: "Anpassa en text till olika läsnivåer",
    desc: "Ta en befintlig faktaText och producera tre versioner: enkel, standard och utmanande – utan att ändra innehållets kärna.",
    prompt: "Här är en text: [KLISTRA IN TEXT]. Skriv om den i tre versioner för åk 7–9: (1) Enkel – korta meningar, vanliga ord. (2) Standard – kursplansnivå. (3) Utmanande – akademiskt språk med facktermer. Behåll alla fakta men anpassa ordförråd och meningsbyggnad."
  },
  {
    subject: "svenska",
    diff: "mellan",
    title: "Argumentationsanalys med responsprotokoll",
    desc: "Låt AI:n analysera en elevtext utifrån argumentationsstruktur och ge konstruktiv återkoppling.",
    prompt: "Analysera följande elevuppsats skriven av en elev i åk 8: [KLISTRA IN TEXT]. Identifiera: (1) tydlig tes, (2) argument och belägg, (3) motargument, (4) slutsats. Ge sedan tre konkreta förbättringsförslag formulerade som frågor eleven kan ställa sig själv. Avsluta med ett uppmuntrande omdöme."
  },
  {
    subject: "svenska",
    diff: "mellan",
    title: "Generera diskussionsfrågor till skönlitteratur",
    desc: "Skapa Socratiska diskussionsfrågor på tre kognitiva nivåer för ett litterärt verk.",
    prompt: "Boken vi läser är [TITEL] av [FÖRFATTARE]. Skapa 9 diskussionsfrågor – 3 faktafrågor (återberättande), 3 tolkningsfrågor (vad menar författaren?) och 3 värderingsfrågor (vad tycker du och varför?). Anpassa frågorna för elever i åk 8."
  },
  {
    subject: "svenska",
    diff: "avance",
    title: "Planera en skrivprocess i fyra steg",
    desc: "Designa en komplett skrivprocess för en argumenterande text med formativ bedömning inbyggd i varje steg.",
    prompt: "Hjälp mig designa en 3-veckors skrivprocess för åk 9 kring en argumenterande text om [ÄMNE]. Inkludera: (1) Brainstorming och planering, (2) Utkast med kamratrespons, (3) Revidering utifrån kunskapskrav C i Lgr22, (4) Publicering/presentation. Ange mål, aktivitet, formativ bedömningsmetod och tidsåtgång per steg."
  },
  {
    subject: "svenska",
    diff: "avance",
    title: "Skapa ett bedömningsschema för muntlig presentation",
    desc: "Generera ett detaljerat matrisbaserat bedömningsschema för muntlig presentation anpassat till Lgr22:s kunskapskrav.",
    prompt: "Skapa ett bedömningsschema (matris) för muntlig presentation i svenska åk 9. Raderna ska vara: innehåll och fakta, struktur och disposition, språk och ordval, kroppsspråk och röst, publikanpassning. Kolumnerna: under godkänt, E, C, A. Basera kriterierna på Lgr22. Formatet: tabell i markdown."
  },

  // ── MATEMATIK ──
  {
    subject: "matematik",
    diff: "grund",
    title: "Förklara ett matematiskt begrepp med vardagsexempel",
    desc: "Gör ett abstrakt matematiskt begrepp konkret med exempel från elevernas vardag.",
    prompt: "Förklara [MATEMATISKT BEGREPP] för en elev i åk 7 som tycker matematik är svårt. Använd ett vardagligt exempel (t.ex. pengar, sport, mat), rita en mental bild med ord och lägg till ett enkelt räkneexempel som eleven kan lösa med miniräknare. Max 150 ord."
  },
  {
    subject: "matematik",
    diff: "grund",
    title: "Generera differentierade övningsuppgifter",
    desc: "Skapa en uppsättning uppgifter på tre svårighetsgrader för samma matematikmoment.",
    prompt: "Skapa 5 uppgifter per nivå (totalt 15) om [MATEMATIK-OMRÅDE] för åk 7–9. Nivå 1 (stöd): procedurmässig träning med tydlig struktur. Nivå 2 (standard): tillämpning i nya sammanhang. Nivå 3 (utmaning): öppna problem och resonemang. Ange vilket kunskapskrav i Lgr22 varje nivå primärt tränar."
  },
  {
    subject: "matematik",
    diff: "mellan",
    title: "Felanalys – vad tänker eleven fel?",
    desc: "Analysera ett vanligt elevmisstag och föreslå hur läraren bör bemöta missförståndet.",
    prompt: "En elev i åk 8 gör följande misstag när de löser [UPPGIFTSTYP]: [BESKRIV FELET]. Analysera: (1) Vilket matematiskt missförstånd ligger troligtvis bakom? (2) Hur kan jag som lärare ställa frågor som hjälper eleven att hitta felet själv? (3) Föreslå en konkret övning som adresserar just detta missförstånd."

  {
    subject: "matematik",
    diff: "mellan",
    title: "Skapa en problemlösningslektion i samarbete",
    desc: "Bygg upp en lektion kring ett öppet problem som uppmuntrar matematiskt samtal.",
    prompt: "Designa en 60-minuterslektion i matematik för åk 8 kring det öppna problemet: [PROBLEM]. Strukturera lektionen i: uppstart (10 min), pararbete (20 min), helklassdiskussion (20 min), reflektion (10 min). Ange vilka matematiska förmågor enligt Lgr22 som tränas och hur jag som lärare stödjer samtalet utan att ge svaret."
  },
  {
    subject: "matematik",
    diff: "avance",
    title: "Designa ett autentiskt bedömningsuppdrag",

    desc: "Skapa material för en interaktiv tidslinjeövning om ett historiskt skeende.",

  {
    subject: "so",
    diff: "grund",
    title: "Förenkla en nyhetsartikel för klassrumsdiskussion",

  },
  {
    subject: "so",
    diff: "mellan",
    title: "Rollspel om ett historiskt dilemma",
    desc: "Bygg upp ett klassrumsrollspel kring ett etiskt historiskt val.",

  {

    diff: "mellan",

    prompt: "Planera en 80-minutersworkshop i källkritik för åk 8. Innehåll: vad är SKVADER-metoden? (introduktion 15 min), par-granskning av tre webbsidor om [ÄMNE] (25 min), helklassdiskussion (15 min), individuell skriftlig reflektion (15 min), summering (10 min). Ge mig lärarmanus, tre konkreta webbadresser eller typer av källor att använda, och bedömningsaspekter."

  {

  },
  {
    subject: "so",
    diff: "avance",
    title: "Skapa ett simulerat FN-möte",
    desc: "Förbered ett klassrumsbaserat FN-rollspel om en aktuell global fråga.",
    prompt: "Förbered ett simulerat FN-möte för åk 9 om [GLOBAL FRÅGA]. Skapa: 8 landsroller med bakgrund, intressen och föreslagen ståndpunkt, mötesordning och regler, tre resolutionsförslag att ta ställning till, och en reflektionsövning efteråt som kopplar till demokratibegreppet i SO Lgr22."

  // ── NO ──
  {
    subject: "no",
    diff: "grund",
    title: "Förklara ett naturvetenskapligt begrepp visuellt",

  },
  {
    subject: "no",
    diff: "grund",

// ── RENDER ──
const grid = document.getElementById('grid');
const searchInput = document.getElementById('search');
const showCount = document.getElementById('showCount');
const ofCount = document.getElementById('ofCount');
const totalCount = document.getElementById('totalCount');

totalCount.textContent = prompts.length;
ofCount.textContent = prompts.length;

let activeSubject = 'alla';
let activeDiff = 'alla';

function subjectClass(s) {
  const map = {
    svenska:'subj-svenska', matematik:'subj-matematik', so:'subj-so', no:'subj-no',
    engelska:'subj-engelska', bedömning:'subj-bedömning', planering:'subj-planering',
    elevhälsa:'subj-elevhälsa', idrott:'subj-idrott', bild:'subj-bild',
    musik:'subj-musik', teknik:'subj-teknik', hem:'subj-hem'
  };
  return map[s] || 'subj-so';
}
function subjectLabel(s) {
  const map = {
    svenska:'Svenska', matematik:'Matematik', so:'SO', no:'NO',
    engelska:'Engelska', bedömning:'Bedömning', planering:'Planering',
    elevhälsa:'Elevhälsa', idrott:'Idrott & hälsa', bild:'Bild',
    musik:'Musik', teknik:'Teknik', hem:'Hem & konsument'
  };
  return map[s] || s;
}
function diffClass(d) { return 'diff-' + d; }
function diffLabel(d) {
  return {grund:'Grundnivå', mellan:'Mellannivå', avance:'Avancerad'}[d] || d;
}

function render() {
  const q = searchInput.value.toLowerCase().trim();
  const filtered = prompts.filter(p => {
    const matchSub = activeSubject === 'alla' || p.subject === activeSubject;
    const matchDiff = activeDiff === 'alla' || p.diff === activeDiff;
    const matchQ = !q || p.title.toLowerCase().includes(q) || p.desc.toLowerCase().includes(q) || p.subject.includes(q) || p.prompt.toLowerCase().includes(q);
    return matchSub && matchDiff && matchQ;
  });

  showCount.textContent = filtered.length;

  if (filtered.length === 0) {
    grid.innerHTML = `<div class="no-results">
      <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <p>Inga prompts matchade din sökning. Prova ett annat ord eller filter.</p>
    </div>`;
    return;
  }

  grid.innerHTML = filtered.map((p, i) => `
    <article class="card">
      <div class="card-top">
        <div class="card-tags">
          <span class="tag tag-subject ${subjectClass(p.subject)}">${subjectLabel(p.subject)}</span>
          <span class="tag tag-diff ${diffClass(p.diff)}">${diffLabel(p.diff)}</span>
        </div>
      </div>
      <h3>${p.title}</h3>
      <p class="card-desc">${p.desc}</p>
      <div class="card-footer">
        <div class="prompt-preview">${p.prompt}</div>
        <button class="btn-copy" data-idx="${prompts.indexOf(p)}">
          <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          Kopiera prompt
        </button>
      </div>
    </article>
  `).join('');
}

// copy handler
grid.addEventListener('click', e => {
  const btn = e.target.closest('.btn-copy');
  if (!btn) return;
  const p = prompts[+btn.dataset.idx];
  navigator.clipboard.writeText(p.prompt).then(() => {
    btn.classList.add('copied');
    btn.innerHTML = `<svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5"/></svg> Kopierad!`;
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.innerHTML = `<svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Kopiera prompt`;
    }, 2000);
  });
});

// filter chips
document.querySelectorAll('[data-filter]').forEach(chip => {
  chip.addEventListener('click', () => {
    const type = chip.dataset.filter;
    document.querySelectorAll(`[data-filter="${type}"]`).forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    if (type === 'subject') activeSubject = chip.dataset.value;
    else activeDiff = chip.dataset.value;
    render();
  });
});

searchInput.addEventListener('input', render);

render();
</script>
