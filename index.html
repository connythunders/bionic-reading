    color: var(--text);
    text-align: left;

    font-family: inherit;

  .option-btn:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-light); }

  }

  .stat-label { color: var(--text-muted); }
  .stat-value { font-weight: 700; }

    background: white;

    padding: 10px 24px;
    display: flex;
    gap: 8px;
    overflow-x: auto;

  .quick-btn {
    padding: 7px 14px;
    border: 1px solid var(--border);
    border-radius: 20px;
    background: white;
    cursor: pointer;
    font-size: 12px;
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
    transition: all 0.15s;
    font-family: inherit;

  .quick-btn:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-light); }
  .quick-btn.primary-btn { background: var(--primary); color: white; border-color: var(--primary); }

    display: flex;
    gap: 5px;
    align-items: center;

    </form>
  </div>
</main>

– Svara alltid på svenska.
– Håll matematiken korrekt.
– Tydlig struktur: numrerade steg, inga onödiga utsvävningar.
– Aktuellt delområde: ${TOPIC_LABELS[currentTopic]}. Betygsnivå: ${currentLevel}.`;
}

function getRandomTask() {
  const tasks = TASK_BANK[currentTopic][currentLevel];
  return tasks[Math.floor(Math.random() * tasks.length)];
}

async function callAPI(messages) {
  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": API_KEY,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true"
    },
    body: JSON.stringify({
      model: MODEL,
      max_tokens: 1500,
      system: buildSystemPrompt(),
      messages: messages
    })
  });

  if (!response.ok) {
    const err = await response.json().catch(() => ({}));
    throw new Error(err.error?.message || `API-fel ${response.status}`);
  }

  const data = await response.json();
  return data.content[0].text;
}

function escapeHtml(text) {
  return text
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");
}

function formatBubble(text) {
  const escaped = escapeHtml(text);
  return escaped
    .replace(/```([\s\S]*?)```/g, "<pre>$1</pre>")
    .replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>")
    .replace(/\*(.*?)\*/g, "<em>$1</em>")
    .replace(/\n/g, "<br>");
}

function addMessage(role, text) {
  const container = document.getElementById("chat-messages");
  const welcome = container.querySelector(".welcome-msg");
  if (welcome) welcome.remove();

  const msg = document.createElement("div");
  msg.className = `message ${role}`;

  const avatar = document.createElement("div");
  avatar.className = "avatar";
  avatar.textContent = role === "ai" ? "∑" : "E";

  const bubble = document.createElement("div");
  bubble.className = "bubble";
  bubble.innerHTML = formatBubble(text);

  msg.appendChild(avatar);
  msg.appendChild(bubble);
  container.appendChild(msg);
  scrollToBottom();
}

function showTyping() {
  const container = document.getElementById("chat-messages");
  const el = document.createElement("div");
  el.className = "typing-indicator";
  el.id = "typing-indicator";

  const avatar = document.createElement("div");
  avatar.className = "avatar";
  avatar.textContent = "∑";

  const dots = document.createElement("div");
  dots.className = "typing-dots";
  dots.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';

  el.appendChild(avatar);
  el.appendChild(dots);
  container.appendChild(el);
  scrollToBottom();
}

function hideTyping() {
  const el = document.getElementById("typing-indicator");
  if (el) el.remove();
}

function showError(msg) {
  const container = document.getElementById("chat-messages");
  const el = document.createElement("div");
  el.className = "error-bubble";
  el.textContent = "Fel: " + msg;
  container.appendChild(el);
  scrollToBottom();
}

function scrollToBottom() {
  const c = document.getElementById("chat-messages");
  c.scrollTop = c.scrollHeight;
}

function setLoading(val) {
  isLoading = val;
  document.getElementById("send-btn").disabled = val;
  document.getElementById("user-input").disabled = val;
}

async function sendMessage(userText) {
  if (isLoading || !userText.trim()) return;

  addMessage("user", userText);
  conversationHistory.push({ role: "user", content: userText });

  setLoading(true);
  showTyping();

  try {
    const reply = await callAPI(conversationHistory);
    hideTyping();
    addMessage("ai", reply);
    conversationHistory.push({ role: "assistant", content: reply });
  } catch (e) {
    hideTyping();
    showError(e.message);
  } finally {
    setLoading(false);
  }
}

async function newTask() {
  if (isLoading) return;
  stats.tasks++;
  updateStats();

  const task = getRandomTask();
  const prompt = `Ge mig en ny uppgift inom ${TOPIC_LABELS[currentTopic]} på nivå ${currentLevel}. Basera den på följande uppgift men variera den lätt: "${task}"`;

  conversationHistory = [];
  await sendMessage(prompt);
}

function sendQuick(text) {
  sendMessage(text);
}

function handleSubmit(e) {
  e.preventDefault();
  const input = document.getElementById("user-input");
  const text = input.value.trim();
  if (!text) return;
  input.value = "";
  autoResize(input);
  sendMessage(text);
}

function handleKeyDown(e) {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    handleSubmit(e);
  }
}

function autoResize(el) {
  el.style.height = "auto";
  el.style.height = Math.min(el.scrollHeight, 120) + "px";
}

function updateStats() {
  document.getElementById("stat-tasks").textContent = stats.tasks;
  document.getElementById("stat-correct").textContent = stats.correct;
  const acc = stats.tasks > 0 ? Math.round((stats.correct / stats.tasks) * 100) : 0;
  document.getElementById("stat-accuracy").textContent = stats.tasks > 0 ? acc + "%" : "–";
  document.getElementById("progress-bar").style.width = (stats.tasks > 0 ? acc : 0) + "%";
}

function resetSession() {
  stats = { tasks: 0, correct: 0 };
  conversationHistory = [];
  updateStats();
  document.getElementById("chat-messages").innerHTML =
    '<div class="welcome-msg"><h3>Session återställd!</h3><p>Tryck på <strong>+ Ny uppgift</strong> för att börja om.</p></div>';
}

function updateHeader() {
  document.getElementById("header-subtitle").textContent =
    `${TOPIC_LABELS[currentTopic]} · Nivå ${currentLevel}`;
}

document.getElementById("topic-group").addEventListener("click", e => {
  const btn = e.target.closest(".option-btn");
  if (!btn) return;
  document.querySelectorAll(".option-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  currentTopic = btn.dataset.topic;
  conversationHistory = [];
  updateHeader();
});

document.getElementById("level-group").addEventListener("click", e => {
  const btn = e.target.closest(".level-btn");
  if (!btn) return;
  document.querySelectorAll(".level-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  currentLevel = btn.dataset.level;
  conversationHistory = [];
  updateHeader();
});
</script>
