<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logo Vektorisering - Konvertera bilder till SVG</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
        }
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .app-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            max-width: 1000px;
            width: 100%;
            padding: 40px;
            margin: 20px 0;
        }
        .app-header { text-align: center; margin-bottom: 30px; }
        .app-header h1 {
            color: #333;
            font-size: 2.2em;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .app-header p { color: #666; font-size: 1.1em; }
        .upload-zone {
            border: 3px dashed #667eea;
            border-radius: 15px;
            padding: 60px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #f8f9ff;
            margin-bottom: 30px;
        }
        .upload-zone:hover, .upload-zone.dragover {
            border-color: #764ba2;
            background: #f0f0ff;
            transform: scale(1.01);
        }
        .upload-zone.has-image {
            padding: 20px;
            border-style: solid;
            border-color: #28a745;
            background: #f0fff4;
        }
        .upload-icon { font-size: 4em; margin-bottom: 15px; }
        .upload-zone h3 { color: #333; margin-bottom: 10px; }
        .upload-zone p { color: #666; }
        #fileInput { display: none; }
        .preview-container { display: none; gap: 20px; margin-bottom: 30px; }
        .preview-container.visible { display: grid; grid-template-columns: 1fr 1fr; }
        .preview-box {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
        }
        .preview-box h3 { color: #333; margin-bottom: 15px; font-size: 1.2em; }
        .preview-box .image-wrapper {
            background: repeating-conic-gradient(#e0e0e0 0% 25%, white 0% 50%) 50% / 20px 20px;
            border-radius: 10px;
            padding: 10px;
            min-height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .preview-box img { max-width: 100%; max-height: 300px; object-fit: contain; }
        #svgPreview { width: 100%; min-height: 100px; display: flex; align-items: center; justify-content: center; }
        #svgPreview svg { max-width: 100%; max-height: 300px; }
        .settings-panel {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
            display: none;
        }
        .settings-panel.visible { display: block; }
        .settings-panel h3 { color: #333; margin-bottom: 20px; text-align: center; }
        .settings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }
        .setting-group { display: flex; flex-direction: column; }
        .setting-group label { color: #555; font-weight: 600; margin-bottom: 8px; font-size: 0.95em; }
        .setting-group select {
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1em;
        }
        .controls { display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; }
        .btn {
            padding: 15px 35px;
            font-size: 1.1em;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4); }
        .btn-primary:disabled { background: #ccc; cursor: not-allowed; transform: none; }
        .btn-success { background: linear-gradient(135deg, #28a745 0%, #20c997 100%); color: white; }
        .btn-success:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(40, 167, 69, 0.4); }
        .btn-secondary { background: #6c757d; color: white; }
        .btn-secondary:hover { background: #5a6268; }
        .loading { display: none; text-align: center; padding: 30px; }
        .loading.visible { display: block; }
        .spinner {
            width: 50px; height: 50px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .status-message {
            text-align: center;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
        }
        .status-message.visible { display: block; }
        .status-message.success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .status-message.error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .file-info {
            background: #e9ecef;
            padding: 10px 15px;
            border-radius: 8px;
            margin-top: 15px;
            font-size: 0.9em;
            color: #495057;
        }
        @media (max-width: 768px) {
            .app-container { padding: 20px; }
            .app-header h1 { font-size: 1.6em; }
            .preview-container.visible { grid-template-columns: 1fr; }
            .controls { flex-direction: column; }
            .btn { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <h1>Logo Vektorisering</h1>
            <p>Konvertera din logotyp till skalbar vektorgrafik (SVG)</p>
        </header>

        <div class="upload-zone" id="uploadZone">
            <div class="upload-icon">📁</div>
            <h3>Dra och slapp din bild har</h3>
            <p>eller klicka for att valja fil</p>
            <p style="margin-top: 10px; font-size: 0.9em; color: #888;">PNG, JPG, GIF, BMP, WebP</p>
            <input type="file" id="fileInput" accept="image/*">
        </div>

        <div class="status-message" id="statusMessage"></div>

        <div class="settings-panel" id="settingsPanel">
            <h3>Installningar</h3>
            <div class="settings-grid">
                <div class="setting-group">
                    <label for="colorMode">Farger</label>
                    <select id="colorMode">
                        <option value="color16">16 farger</option>
                        <option value="color8">8 farger</option>
                        <option value="color4">4 farger</option>
                        <option value="bw">Svartvit</option>
                    </select>
                </div>
                <div class="setting-group">
                    <label for="detailLevel">Detaljer</label>
                    <select id="detailLevel">
                        <option value="low">Lag</option>
                        <option value="medium" selected>Medium</option>
                        <option value="high">Hog</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="preview-container" id="previewContainer">
            <div class="preview-box">
                <h3>Original</h3>
                <div class="image-wrapper">
                    <img id="originalPreview" alt="Original">
                </div>
                <div class="file-info" id="fileInfo"></div>
            </div>
            <div class="preview-box">
                <h3>Vektoriserad (SVG)</h3>
                <div class="image-wrapper">
                    <div id="svgPreview"><p style="color:#999">Klicka "Vektorisera"</p></div>
                </div>
                <div class="file-info" id="svgInfo"></div>
            </div>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Vektoriserar...</p>
        </div>

        <div class="controls">
            <button class="btn btn-primary" id="vectorizeBtn" disabled>Vektorisera</button>
            <button class="btn btn-success" id="downloadBtn" style="display:none">Ladda ner SVG</button>
            <button class="btn btn-secondary" id="resetBtn" style="display:none">Borja om</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/imagetracerjs@1.2.6/imagetracer_v1.2.6.min.js"></script>
    <script>
    (function(){
        let imgData = null, svgResult = null, fileName = '';
        const $ = id => document.getElementById(id);

        // Elements
        const uploadZone = $('uploadZone'), fileInput = $('fileInput');
        const settingsPanel = $('settingsPanel'), previewContainer = $('previewContainer');
        const originalPreview = $('originalPreview'), svgPreview = $('svgPreview');
        const vectorizeBtn = $('vectorizeBtn'), downloadBtn = $('downloadBtn'), resetBtn = $('resetBtn');
        const loading = $('loading'), statusMessage = $('statusMessage');
        const fileInfo = $('fileInfo'), svgInfo = $('svgInfo');

        // Events
        uploadZone.onclick = () => fileInput.click();
        uploadZone.ondragover = e => { e.preventDefault(); uploadZone.classList.add('dragover'); };
        uploadZone.ondragleave = e => { e.preventDefault(); uploadZone.classList.remove('dragover'); };
        uploadZone.ondrop = e => { e.preventDefault(); uploadZone.classList.remove('dragover'); if(e.dataTransfer.files[0]) processFile(e.dataTransfer.files[0]); };
        fileInput.onchange = e => { if(e.target.files[0]) processFile(e.target.files[0]); };
        vectorizeBtn.onclick = vectorize;
        downloadBtn.onclick = download;
        resetBtn.onclick = reset;

        function showStatus(msg, type) {
            statusMessage.textContent = msg;
            statusMessage.className = 'status-message visible ' + type;
        }

        function processFile(file) {
            if (!file.type.startsWith('image/')) { showStatus('Valj en bildfil', 'error'); return; }
            fileName = file.name.replace(/\.[^/.]+$/, '');
            const reader = new FileReader();
            reader.onload = e => {
                const img = new Image();
                img.onload = () => {
                    // Scale down if too large
                    const max = 800;
                    let w = img.width, h = img.height;
                    if (w > max || h > max) {
                        if (w > h) { h = Math.round(h * max / w); w = max; }
                        else { w = Math.round(w * max / h); h = max; }
                    }
                    const canvas = document.createElement('canvas');
                    canvas.width = w; canvas.height = h;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, w, h);
                    imgData = ctx.getImageData(0, 0, w, h);
                    originalPreview.src = canvas.toDataURL();
                    
                    uploadZone.classList.add('has-image');
                    uploadZone.innerHTML = '<div class="upload-icon">✓</div><h3>Bild laddad!</h3><p>' + file.name + '</p>';
                    fileInfo.innerHTML = '<b>Storlek:</b> ' + w + ' x ' + h + ' px';
                    settingsPanel.classList.add('visible');
                    previewContainer.classList.add('visible');
                    vectorizeBtn.disabled = false;
                    resetBtn.style.display = 'inline-block';
                    downloadBtn.style.display = 'none';
                    svgPreview.innerHTML = '<p style="color:#999">Klicka "Vektorisera"</p>';
                    svgInfo.innerHTML = '';
                    showStatus('Bild laddad! Klicka Vektorisera.', 'success');
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function vectorize() {
            if (!imgData) return;
            if (typeof ImageTracer === 'undefined') {
                showStatus('Biblioteket laddades inte. Ladda om sidan.', 'error');
                return;
            }
            loading.classList.add('visible');
            vectorizeBtn.disabled = true;
            
            setTimeout(() => {
                try {
                    const colorMode = $('colorMode').value;
                    const detailLevel = $('detailLevel').value;
                    
                    let opts = { 
                        ltres: 1, qtres: 1, pathomit: 8,
                        colorsampling: 2, numberofcolors: 16,
                        strokewidth: 0, scale: 1
                    };
                    
                    if (colorMode === 'color8') opts.numberofcolors = 8;
                    else if (colorMode === 'color4') opts.numberofcolors = 4;
                    else if (colorMode === 'bw') { opts.numberofcolors = 2; opts.colorsampling = 0; }
                    
                    if (detailLevel === 'low') { opts.ltres = 2; opts.qtres = 2; opts.pathomit = 16; }
                    else if (detailLevel === 'high') { opts.ltres = 0.5; opts.qtres = 0.5; opts.pathomit = 4; }

                    svgResult = ImageTracer.imagedataToSVG(imgData, opts);
                    svgPreview.innerHTML = svgResult;
                    
                    const svg = svgPreview.querySelector('svg');
                    if (svg) {
                        svg.style.maxWidth = '100%';
                        svg.style.maxHeight = '300px';
                    }
                    
                    svgInfo.innerHTML = '<b>Format:</b> SVG<br><b>Storlek:</b> ' + (new Blob([svgResult]).size / 1024).toFixed(1) + ' KB';
                    downloadBtn.style.display = 'inline-block';
                    showStatus('Klar! Ladda ner din SVG.', 'success');
                } catch(err) {
                    console.error(err);
                    showStatus('Fel: ' + err.message, 'error');
                }
                loading.classList.remove('visible');
                vectorizeBtn.disabled = false;
            }, 50);
        }

        function download() {
            if (!svgResult) return;
            const a = document.createElement('a');
            a.href = URL.createObjectURL(new Blob([svgResult], {type: 'image/svg+xml'}));
            a.download = fileName + '-vektor.svg';
            a.click();
        }

        function reset() {
            imgData = null; svgResult = null; fileName = '';
            fileInput.value = '';
            uploadZone.classList.remove('has-image');
            uploadZone.innerHTML = '<div class="upload-icon">📁</div><h3>Dra och slapp din bild har</h3><p>eller klicka for att valja fil</p><p style="margin-top:10px;font-size:0.9em;color:#888">PNG, JPG, GIF, BMP, WebP</p><input type="file" id="fileInput" accept="image/*">';
            document.getElementById('fileInput').onchange = e => { if(e.target.files[0]) processFile(e.target.files[0]); };
            settingsPanel.classList.remove('visible');
            previewContainer.classList.remove('visible');
            vectorizeBtn.disabled = true;
            downloadBtn.style.display = 'none';
            resetBtn.style.display = 'none';
            statusMessage.classList.remove('visible');
        }
    })();
    </script>
</body>
</html>
