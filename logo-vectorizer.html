<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logo Vektorisering - Konvertera bilder till SVG</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
            background: linear-gradient(
                135deg,
                #667eea 0%,
                #764ba2 50%,
                #f093fb 100%
            );
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .app-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            max-width: 1000px;
            width: 100%;
            padding: 40px;
            backdrop-filter: blur(10px);
            margin: 20px 0;
        }

        .app-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .app-header h1 {
            color: #333;
            font-size: 2.2em;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .app-header p {
            color: #666;
            font-size: 1.1em;
        }

        .upload-zone {
            border: 3px dashed #667eea;
            border-radius: 15px;
            padding: 60px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #f8f9ff;
            margin-bottom: 30px;
        }

        .upload-zone:hover, .upload-zone.dragover {
            border-color: #764ba2;
            background: #f0f0ff;
            transform: scale(1.01);
        }

        .upload-zone.has-image {
            padding: 20px;
            border-style: solid;
            border-color: #28a745;
            background: #f0fff4;
        }

        .upload-icon {
            font-size: 4em;
            margin-bottom: 15px;
        }

        .upload-zone h3 {
            color: #333;
            margin-bottom: 10px;
        }

        .upload-zone p {
            color: #666;
        }

        #fileInput {
            display: none;
        }

        .preview-container {
            display: none;
            gap: 20px;
            margin-bottom: 30px;
        }

        .preview-container.visible {
            display: grid;
            grid-template-columns: 1fr 1fr;
        }

        .preview-box {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
        }

        .preview-box h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.2em;
        }

        .preview-box .image-wrapper {
            background: repeating-conic-gradient(#e0e0e0 0% 25%, white 0% 50%) 50% / 20px 20px;
            border-radius: 10px;
            padding: 10px;
            min-height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .preview-box img, .preview-box svg {
            max-width: 100%;
            max-height: 300px;
            object-fit: contain;
        }

        #svgPreview {
            width: 100%;
            height: auto;
            max-height: 300px;
        }

        .settings-panel {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
            display: none;
        }

        .settings-panel.visible {
            display: block;
        }

        .settings-panel h3 {
            color: #333;
            margin-bottom: 20px;
            text-align: center;
        }

        .settings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .setting-group {
            display: flex;
            flex-direction: column;
        }

        .setting-group label {
            color: #555;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.95em;
        }

        .setting-group select, .setting-group input[type="range"] {
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        .setting-group select:focus, .setting-group input:focus {
            border-color: #667eea;
            outline: none;
        }

        .setting-group input[type="range"] {
            padding: 5px;
            cursor: pointer;
        }

        .range-value {
            text-align: center;
            color: #667eea;
            font-weight: bold;
            margin-top: 5px;
        }

        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 15px 35px;
            font-size: 1.1em;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn-success {
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
            color: white;
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(40, 167, 69, 0.4);
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-secondary:hover {
            background: #5a6268;
            transform: translateY(-2px);
        }

        .loading {
            display: none;
            text-align: center;
            padding: 30px;
        }

        .loading.visible {
            display: block;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .status-message {
            text-align: center;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
        }

        .status-message.visible {
            display: block;
        }

        .status-message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status-message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .file-info {
            background: #e9ecef;
            padding: 10px 15px;
            border-radius: 8px;
            margin-top: 15px;
            font-size: 0.9em;
            color: #495057;
        }

        @media (max-width: 768px) {
            .app-container {
                padding: 20px;
            }

            .app-header h1 {
                font-size: 1.6em;
            }

            .preview-container.visible {
                grid-template-columns: 1fr;
            }

            .controls {
                flex-direction: column;
            }

            .btn {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <h1>Logo Vektorisering</h1>
            <p>Konvertera din logotyp eller bild till skalbar vektorgrafik (SVG)</p>
        </header>

        <div class="upload-zone" id="uploadZone">
            <div class="upload-icon">📁</div>
            <h3>Dra och slapp din bild har</h3>
            <p>eller klicka for att valja fil</p>
            <p style="margin-top: 10px; font-size: 0.9em; color: #888;">
                Stodda format: PNG, JPG, GIF, BMP, WebP
            </p>
            <input type="file" id="fileInput" accept="image/*">
        </div>

        <div class="status-message" id="statusMessage"></div>

        <div class="settings-panel" id="settingsPanel">
            <h3>Vektoriseringsinstellningar</h3>
            <div class="settings-grid">
                <div class="setting-group">
                    <label for="colorMode">Fargalternativ</label>
                    <select id="colorMode">
                        <option value="color">Farglagd (16 farger)</option>
                        <option value="color64">Farglagd (64 farger)</option>
                        <option value="grayscale">Graatoner</option>
                        <option value="bw">Svartvit</option>
                    </select>
                </div>
                <div class="setting-group">
                    <label for="detailLevel">Detaljniva</label>
                    <select id="detailLevel">
                        <option value="low">Lag (snabbare)</option>
                        <option value="medium" selected>Medium</option>
                        <option value="high">Hog (langsam)</option>
                    </select>
                </div>
                <div class="setting-group">
                    <label for="strokeWidth">Linjetjocklek: <span id="strokeValue">0</span>px</label>
                    <input type="range" id="strokeWidth" min="0" max="5" value="0" step="0.5">
                </div>
                <div class="setting-group">
                    <label for="blurRadius">Forbehandling (blur): <span id="blurValue">0</span>px</label>
                    <input type="range" id="blurRadius" min="0" max="5" value="0" step="1">
                </div>
            </div>
        </div>

        <div class="preview-container" id="previewContainer">
            <div class="preview-box">
                <h3>Original</h3>
                <div class="image-wrapper">
                    <img id="originalPreview" alt="Original bild">
                </div>
                <div class="file-info" id="fileInfo"></div>
            </div>
            <div class="preview-box">
                <h3>Vektoriserad (SVG)</h3>
                <div class="image-wrapper" id="svgWrapper">
                    <div id="svgPreview"></div>
                </div>
                <div class="file-info" id="svgInfo"></div>
            </div>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Vektoriserar bilden...</p>
        </div>

        <div class="controls" id="controls">
            <button class="btn btn-primary" id="vectorizeBtn" disabled>
                <span>Vektorisera</span>
            </button>
            <button class="btn btn-success" id="downloadBtn" style="display: none;">
                <span>Ladda ner SVG</span>
            </button>
            <button class="btn btn-secondary" id="resetBtn" style="display: none;">
                <span>Borja om</span>
            </button>
        </div>
    </div>

    <script>
        // App State
        let currentImage = null;
        let currentSvg = null;
        let originalFileName = '';

        // DOM Elements
        const uploadZone = document.getElementById('uploadZone');
        const fileInput = document.getElementById('fileInput');
        const settingsPanel = document.getElementById('settingsPanel');
        const previewContainer = document.getElementById('previewContainer');
        const originalPreview = document.getElementById('originalPreview');
        const svgPreview = document.getElementById('svgPreview');
        const vectorizeBtn = document.getElementById('vectorizeBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const resetBtn = document.getElementById('resetBtn');
        const loading = document.getElementById('loading');
        const statusMessage = document.getElementById('statusMessage');
        const fileInfo = document.getElementById('fileInfo');
        const svgInfo = document.getElementById('svgInfo');
        const strokeWidth = document.getElementById('strokeWidth');
        const strokeValue = document.getElementById('strokeValue');
        const blurRadius = document.getElementById('blurRadius');
        const blurValue = document.getElementById('blurValue');

        // Event Listeners
        uploadZone.addEventListener('click', () => fileInput.click());
        uploadZone.addEventListener('dragover', handleDragOver);
        uploadZone.addEventListener('dragleave', handleDragLeave);
        uploadZone.addEventListener('drop', handleDrop);
        fileInput.addEventListener('change', handleFileSelect);
        vectorizeBtn.addEventListener('click', vectorizeImage);
        downloadBtn.addEventListener('click', downloadSvg);
        resetBtn.addEventListener('click', resetApp);
        strokeWidth.addEventListener('input', () => strokeValue.textContent = strokeWidth.value);
        blurRadius.addEventListener('input', () => blurValue.textContent = blurRadius.value);

        function handleDragOver(e) {
            e.preventDefault();
            uploadZone.classList.add('dragover');
        }

        function handleDragLeave(e) {
            e.preventDefault();
            uploadZone.classList.remove('dragover');
        }

        function handleDrop(e) {
            e.preventDefault();
            uploadZone.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                processFile(files[0]);
            }
        }

        function handleFileSelect(e) {
            const files = e.target.files;
            if (files.length > 0) {
                processFile(files[0]);
            }
        }

        function processFile(file) {
            if (!file.type.startsWith('image/')) {
                showStatus('Vänligen välj en bildfil.', 'error');
                return;
            }

            originalFileName = file.name.replace(/\.[^/.]+$/, '');
            const reader = new FileReader();

            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    currentImage = img;
                    originalPreview.src = e.target.result;

                    // Update UI
                    uploadZone.classList.add('has-image');
                    uploadZone.innerHTML = `
                        <div class="upload-icon">✓</div>
                        <h3>Bild laddad!</h3>
                        <p>${file.name}</p>
                        <p style="margin-top: 10px; font-size: 0.9em;">Klicka för att byta bild</p>
                    `;

                    // Show file info
                    fileInfo.innerHTML = `
                        <strong>Filnamn:</strong> ${file.name}<br>
                        <strong>Storlek:</strong> ${formatFileSize(file.size)}<br>
                        <strong>Dimensioner:</strong> ${img.width} x ${img.height} px
                    `;

                    // Show panels
                    settingsPanel.classList.add('visible');
                    previewContainer.classList.add('visible');
                    vectorizeBtn.disabled = false;

                    // Hide SVG preview until vectorized
                    svgPreview.innerHTML = '<p style="color: #999;">Klicka på "Vektorisera" för att se resultatet</p>';
                    svgInfo.innerHTML = '';
                    downloadBtn.style.display = 'none';
                    resetBtn.style.display = 'inline-flex';

                    showStatus('Bild laddad! Justera inställningarna och klicka på "Vektorisera".', 'success');
                };
                img.onerror = function() {
                    showStatus('Kunde inte ladda bilden. Försök med en annan fil.', 'error');
                };
                img.src = e.target.result;
            };

            reader.onerror = function() {
                showStatus('Fel vid läsning av fil.', 'error');
            };

            reader.readAsDataURL(file);
        }

        function vectorizeImage() {
            if (!currentImage) return;

            loading.classList.add('visible');
            vectorizeBtn.disabled = true;
            hideStatus();

            // Use setTimeout to allow UI to update
            setTimeout(() => {
                try {
                    // Create canvas from image
                    const canvas = document.createElement('canvas');
                    canvas.width = currentImage.width;
                    canvas.height = currentImage.height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(currentImage, 0, 0);

                    // Get image data
                    const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);

                    // Build options based on settings
                    const options = buildOptions();

                    // Perform vectorization
                    const svgString = ImageTracer.imagedataToSVG(imgData, options);

                    // Display result
                    currentSvg = svgString;
                    svgPreview.innerHTML = svgString;

                    // Make SVG responsive
                    const svgElement = svgPreview.querySelector('svg');
                    if (svgElement) {
                        svgElement.style.maxWidth = '100%';
                        svgElement.style.height = 'auto';
                    }

                    // Update SVG info
                    const svgSize = new Blob([svgString]).size;
                    svgInfo.innerHTML = `
                        <strong>Format:</strong> SVG (Vektorgrafik)<br>
                        <strong>Storlek:</strong> ${formatFileSize(svgSize)}<br>
                        <strong>Skalbar:</strong> Ja (utan kvalitetsförlust)
                    `;

                    // Show download button
                    downloadBtn.style.display = 'inline-flex';

                    showStatus('Vektorisering klar! Du kan nu ladda ner SVG-filen.', 'success');

                } catch (error) {
                    console.error('Vectorization error:', error);
                    showStatus('Ett fel uppstod vid vektoriseringen. Försök igen.', 'error');
                } finally {
                    loading.classList.remove('visible');
                    vectorizeBtn.disabled = false;
                }
            }, 100);
        }

        function buildOptions() {
            const colorMode = document.getElementById('colorMode').value;
            const detailLevel = document.getElementById('detailLevel').value;
            const stroke = parseFloat(strokeWidth.value);
            const blur = parseInt(blurRadius.value);

            let options = {
                strokewidth: stroke,
                blurradius: blur,
            };

            // Color mode settings
            switch (colorMode) {
                case 'color':
                    options.numberofcolors = 16;
                    options.colorsampling = 2;
                    break;
                case 'color64':
                    options.numberofcolors = 64;
                    options.colorsampling = 2;
                    break;
                case 'grayscale':
                    options.colorsampling = 0;
                    options.colorquantcycles = 1;
                    options.numberofcolors = 7;
                    break;
                case 'bw':
                    options.colorsampling = 0;
                    options.numberofcolors = 2;
                    break;
            }

            // Detail level settings
            switch (detailLevel) {
                case 'low':
                    options.ltres = 2;
                    options.qtres = 2;
                    options.pathomit = 16;
                    break;
                case 'medium':
                    options.ltres = 1;
                    options.qtres = 1;
                    options.pathomit = 8;
                    break;
                case 'high':
                    options.ltres = 0.5;
                    options.qtres = 0.5;
                    options.pathomit = 4;
                    break;
            }

            return options;
        }

        function downloadSvg() {
            if (!currentSvg) return;

            const blob = new Blob([currentSvg], { type: 'image/svg+xml' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${originalFileName}-vektoriserad.svg`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);

            showStatus('SVG-fil nedladdad!', 'success');
        }

        function resetApp() {
            currentImage = null;
            currentSvg = null;
            originalFileName = '';
            fileInput.value = '';

            uploadZone.classList.remove('has-image');
            uploadZone.innerHTML = `
                <div class="upload-icon">📁</div>
                <h3>Dra och släpp din bild här</h3>
                <p>eller klicka för att välja fil</p>
                <p style="margin-top: 10px; font-size: 0.9em; color: #888;">
                    Stödda format: PNG, JPG, GIF, BMP, WebP
                </p>
            `;

            settingsPanel.classList.remove('visible');
            previewContainer.classList.remove('visible');
            vectorizeBtn.disabled = true;
            downloadBtn.style.display = 'none';
            resetBtn.style.display = 'none';

            hideStatus();
        }

        function showStatus(message, type) {
            statusMessage.textContent = message;
            statusMessage.className = `status-message visible ${type}`;
        }

        function hideStatus() {
            statusMessage.classList.remove('visible');
        }

        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }
    </script>
</body>
</html>
