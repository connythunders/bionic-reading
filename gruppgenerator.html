<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gruppgenerator – Lärarverktyg</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #f0f4f8;
            --bg-card: #ffffff;
            --text: #1a2a3a;
            --text-dim: #4a5568;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --border: #d1d9e6;
            --shadow: 0 4px 20px rgba(0,0,0,0.08);
            --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
            --radius: 16px;
            --radius-sm: 10px;
            --green: #22c55e;
            --green-soft: #dcfce7;
            --blue-soft: #dbeafe;
            --yellow-soft: #fef9c3;
            --red-soft: #fee2e2;
            --purple-soft: #f3e8ff;
            --orange-soft: #fff7ed;
            --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        html, body {
            min-height: 100vh;
            font-family: var(--font);
            color: var(--text);
            background: var(--bg);
        }

        *:focus-visible {
            outline: 3px solid var(--accent);
            outline-offset: 2px;
        }

        /* ===== HEADER ===== */
        .header {
            background: var(--bg-card);
            border-bottom: 2px solid var(--border);
            padding: 16px 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }

        .header a {
            text-decoration: none;
            color: var(--text-dim);
            font-size: 1.4rem;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            background: var(--bg);
            border: 1px solid var(--border);
            transition: all 0.2s;
        }
        .header a:hover {
            background: var(--blue-soft);
            color: var(--accent);
        }

        .header h1 {
            font-size: 1.3rem;
            font-weight: 700;
        }

        .header h1 span {
            color: var(--text-dim);
            font-weight: 400;
            font-size: 0.9rem;
            margin-left: 8px;
        }

        /* ===== LAYOUT ===== */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px;
            display: grid;
            grid-template-columns: 340px 1fr;
            gap: 24px;
        }

        @media (max-width: 800px) {
            .container {
                grid-template-columns: 1fr;
                padding: 16px;
            }
        }

        /* ===== CARD ===== */
        .card {
            background: var(--bg-card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border: 2px solid var(--border);
            padding: 24px;
        }

        .card-title {
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-dim);
            margin-bottom: 16px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--bg);
        }

        /* ===== SIDEBAR ===== */
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .class-textarea {
            width: 100%;
            min-height: 200px;
            border: 2px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 12px;
            font-size: 0.95rem;
            font-family: inherit;
            resize: vertical;
            color: var(--text);
            background: var(--bg);
            line-height: 1.6;
            transition: border-color 0.2s;
        }
        .class-textarea:focus {
            border-color: var(--accent);
            outline: none;
        }

        .student-count {
            font-size: 0.85rem;
            color: var(--text-dim);
            margin-top: 8px;
        }

        .btn-row {
            display: flex;
            gap: 8px;
            margin-top: 4px;
        }

        .btn-small {
            padding: 6px 12px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
            font-family: inherit;
            background: var(--bg);
            color: var(--text-dim);
            transition: all 0.2s;
        }
        .btn-small:hover {
            background: var(--border);
        }

        /* ===== GROUP SIZE ===== */
        .group-size-options {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .size-btn {
            width: 52px;
            height: 52px;
            border-radius: var(--radius-sm);
            border: 3px solid var(--border);
            background: var(--bg);
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: 700;
            font-family: inherit;
            color: var(--text-dim);
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;
        }
        .size-btn .size-label {
            font-size: 0.55rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        .size-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }
        .size-btn.active {
            border-color: var(--accent);
            background: var(--blue-soft);
            color: var(--accent);
        }

        /* ===== ACTION BUTTONS ===== */
        .btn-primary {
            width: 100%;
            padding: 14px 20px;
            border-radius: var(--radius-sm);
            border: none;
            cursor: pointer;
            font-size: 1.05rem;
            font-weight: 700;
            font-family: inherit;
            background: var(--accent);
            color: #fff;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-primary:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(59,130,246,0.3);
        }
        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            width: 100%;
            padding: 14px 20px;
            border-radius: var(--radius-sm);
            border: 3px solid var(--green);
            cursor: pointer;
            font-size: 1.05rem;
            font-weight: 700;
            font-family: inherit;
            background: var(--green-soft);
            color: #166534;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-secondary:hover {
            background: var(--green);
            color: #fff;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(34,197,94,0.3);
        }
        .btn-secondary:active {
            transform: translateY(0);
        }

        /* ===== MAIN CONTENT ===== */
        .main-content {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* ===== RANDOM STUDENT PICKER ===== */
        .picker-area {
            text-align: center;
            position: relative;
        }

        .picker-result {
            font-size: 3rem;
            font-weight: 800;
            padding: 40px 20px;
            background: var(--bg);
            border-radius: var(--radius);
            min-height: 130px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            border: 3px solid transparent;
        }

        .picker-result.highlight {
            background: var(--green-soft);
            border-color: var(--green);
            animation: pop 0.3s ease;
        }

        .picker-result.spinning {
            animation: pulse 0.15s ease infinite;
        }

        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .picker-history {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-top: 12px;
            justify-content: center;
        }

        .picker-history-item {
            padding: 4px 12px;
            border-radius: 20px;
            background: var(--bg);
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-dim);
            border: 1px solid var(--border);
        }

        /* ===== GROUPS DISPLAY ===== */
        .groups-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 16px;
        }

        .group-card {
            background: var(--bg-card);
            border-radius: var(--radius);
            border: 2px solid var(--border);
            padding: 16px;
            animation: slideUp 0.3s ease both;
            transition: box-shadow 0.2s;
        }

        .group-card:hover {
            box-shadow: var(--shadow-lg);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .group-card:nth-child(1) { animation-delay: 0.0s; }
        .group-card:nth-child(2) { animation-delay: 0.05s; }
        .group-card:nth-child(3) { animation-delay: 0.1s; }
        .group-card:nth-child(4) { animation-delay: 0.15s; }
        .group-card:nth-child(5) { animation-delay: 0.2s; }
        .group-card:nth-child(6) { animation-delay: 0.25s; }
        .group-card:nth-child(7) { animation-delay: 0.3s; }
        .group-card:nth-child(8) { animation-delay: 0.35s; }
        .group-card:nth-child(9) { animation-delay: 0.4s; }
        .group-card:nth-child(10) { animation-delay: 0.45s; }
        .group-card:nth-child(11) { animation-delay: 0.5s; }
        .group-card:nth-child(12) { animation-delay: 0.55s; }
        .group-card:nth-child(13) { animation-delay: 0.6s; }
        .group-card:nth-child(14) { animation-delay: 0.65s; }
        .group-card:nth-child(15) { animation-delay: 0.7s; }

        .group-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
            padding-bottom: 8px;
            border-bottom: 2px solid var(--bg);
        }

        .group-number {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 0.9rem;
            color: #fff;
            flex-shrink: 0;
        }

        .group-label {
            font-weight: 700;
            font-size: 0.9rem;
            color: var(--text-dim);
        }

        .group-members {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .group-member {
            padding: 8px 12px;
            border-radius: 8px;
            background: var(--bg);
            font-weight: 500;
            font-size: 0.95rem;
            border-left: 4px solid var(--accent);
        }

        /* Group color variations */
        .group-color-0 .group-number { background: #3b82f6; }
        .group-color-0 .group-member { border-left-color: #3b82f6; }
        .group-color-1 .group-number { background: #8b5cf6; }
        .group-color-1 .group-member { border-left-color: #8b5cf6; }
        .group-color-2 .group-number { background: #ec4899; }
        .group-color-2 .group-member { border-left-color: #ec4899; }
        .group-color-3 .group-number { background: #f97316; }
        .group-color-3 .group-member { border-left-color: #f97316; }
        .group-color-4 .group-number { background: #14b8a6; }
        .group-color-4 .group-member { border-left-color: #14b8a6; }
        .group-color-5 .group-number { background: #ef4444; }
        .group-color-5 .group-member { border-left-color: #ef4444; }
        .group-color-6 .group-number { background: #eab308; }
        .group-color-6 .group-member { border-left-color: #eab308; }
        .group-color-7 .group-number { background: #22c55e; }
        .group-color-7 .group-member { border-left-color: #22c55e; }

        /* ===== EMPTY STATE ===== */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-dim);
        }
        .empty-state .icon {
            font-size: 3rem;
            margin-bottom: 12px;
            opacity: 0.5;
        }
        .empty-state p {
            font-size: 1rem;
            line-height: 1.6;
        }

        /* ===== TABS ===== */
        .tabs {
            display: flex;
            gap: 4px;
            background: var(--bg);
            padding: 4px;
            border-radius: var(--radius-sm);
            margin-bottom: 20px;
        }

        .tab-btn {
            flex: 1;
            padding: 10px 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            font-family: inherit;
            background: transparent;
            color: var(--text-dim);
            transition: all 0.2s;
        }
        .tab-btn:hover {
            background: rgba(255,255,255,0.5);
        }
        .tab-btn.active {
            background: var(--bg-card);
            color: var(--text);
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
        }

        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 800px) {
            .picker-result {
                font-size: 2rem;
                padding: 30px 16px;
                min-height: 100px;
            }
            .groups-container {
                grid-template-columns: 1fr;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <!-- HEADER -->
    <div class="header">
        <a href="index.html" title="Tillbaka till startsidan" aria-label="Hem">&#8962;</a>
        <h1>Gruppgenerator <span>Slumpa grupper & elever</span></h1>
    </div>

    <div class="container">
        <!-- SIDEBAR -->
        <div class="sidebar">
            <!-- CLASS LIST -->
            <div class="card">
                <div class="card-title">Klasslista</div>
                <textarea
                    class="class-textarea"
                    id="classlist"
                    placeholder="Skriv elevnamn, ett per rad...&#10;&#10;Exempel:&#10;Ali&#10;Bella&#10;Carlos&#10;Diana"
                    aria-label="Klasslista"
                    rows="10"
                ></textarea>
                <div class="student-count" id="student-count">0 elever</div>
                <div class="btn-row">
                    <button class="btn-small" onclick="saveClassList()" title="Spara listan i webbläsaren">Spara lista</button>
                    <button class="btn-small" onclick="clearClassList()">Rensa</button>
                    <button class="btn-small" onclick="sortClassList()">Sortera A-Z</button>
                </div>
            </div>

            <!-- GROUP SIZE -->
            <div class="card">
                <div class="card-title">Gruppstorlek</div>
                <div class="group-size-options" id="size-options">
                    <button class="size-btn active" data-size="2" onclick="setGroupSize(2, this)">
                        <span>2</span>
                        <span class="size-label">Par</span>
                    </button>
                    <button class="size-btn" data-size="3" onclick="setGroupSize(3, this)">
                        <span>3</span>
                        <span class="size-label">Tre</span>
                    </button>
                    <button class="size-btn" data-size="4" onclick="setGroupSize(4, this)">
                        <span>4</span>
                        <span class="size-label">Fyra</span>
                    </button>
                    <button class="size-btn" data-size="5" onclick="setGroupSize(5, this)">
                        <span>5</span>
                        <span class="size-label">Fem</span>
                    </button>
                    <button class="size-btn" data-size="6" onclick="setGroupSize(6, this)">
                        <span>6</span>
                        <span class="size-label">Sex</span>
                    </button>
                </div>
            </div>

            <!-- ACTION BUTTONS -->
            <div class="card" style="display: flex; flex-direction: column; gap: 12px;">
                <button class="btn-primary" onclick="generateGroups()">
                    Slumpa grupper
                </button>
                <button class="btn-secondary" onclick="pickRandomStudent()">
                    Slumpa en elev
                </button>
            </div>
        </div>

        <!-- MAIN CONTENT -->
        <div class="main-content">
            <!-- TABS -->
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('groups', this)">Grupper</button>
                <button class="tab-btn" onclick="switchTab('picker', this)">Slumpa elev</button>
            </div>

            <!-- GROUPS TAB -->
            <div class="tab-content active" id="tab-groups">
                <div class="groups-container" id="groups-output">
                    <div class="empty-state" style="grid-column: 1 / -1;">
                        <div class="icon">&#128101;</div>
                        <p>Skriv in klasslistan till vanster,<br>valj gruppstorlek och klicka "Slumpa grupper"</p>
                    </div>
                </div>
            </div>

            <!-- PICKER TAB -->
            <div class="tab-content" id="tab-picker">
                <div class="card">
                    <div class="picker-area">
                        <div class="picker-result" id="picker-result">?</div>
                        <div class="picker-history" id="picker-history"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
    // =============================================
    // GRUPPGENERATOR
    // =============================================

    let groupSize = 2;
    let pickerHistory = [];

    // ===== CLASS LIST =====
    const classlistEl = document.getElementById('classlist');
    const countEl = document.getElementById('student-count');

    function getStudents() {
        return classlistEl.value
            .split('\n')
            .map(n => n.trim())
            .filter(n => n.length > 0);
    }

    function updateCount() {
        const count = getStudents().length;
        countEl.textContent = count + (count === 1 ? ' elev' : ' elever');
    }

    classlistEl.addEventListener('input', updateCount);

    function saveClassList() {
        localStorage.setItem('gruppgen-classlist', classlistEl.value);
        const btn = event.target;
        const orig = btn.textContent;
        btn.textContent = 'Sparat!';
        btn.style.background = 'var(--green-soft)';
        btn.style.color = '#166534';
        setTimeout(() => {
            btn.textContent = orig;
            btn.style.background = '';
            btn.style.color = '';
        }, 1500);
    }

    function loadClassList() {
        const saved = localStorage.getItem('gruppgen-classlist');
        if (saved) {
            classlistEl.value = saved;
            updateCount();
        }
    }

    function clearClassList() {
        classlistEl.value = '';
        updateCount();
    }

    function sortClassList() {
        const students = getStudents();
        students.sort((a, b) => a.localeCompare(b, 'sv'));
        classlistEl.value = students.join('\n');
    }

    // ===== GROUP SIZE =====
    function setGroupSize(size, btn) {
        groupSize = size;
        document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    // ===== SHUFFLE (Fisher-Yates) =====
    function shuffle(arr) {
        const a = [...arr];
        for (let i = a.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
    }

    // ===== GENERATE GROUPS =====
    function generateGroups() {
        const students = getStudents();
        if (students.length === 0) {
            alert('Skriv in elevnamn i klasslistan forst!');
            return;
        }

        if (students.length < groupSize) {
            alert('Det finns farre elever an gruppstorlek. Valj en mindre gruppstorlek.');
            return;
        }

        // Switch to groups tab
        switchTab('groups', document.querySelector('.tab-btn'));

        const shuffled = shuffle(students);
        const groups = [];
        const numGroups = Math.ceil(shuffled.length / groupSize);

        // Distribute students evenly
        for (let i = 0; i < numGroups; i++) {
            groups.push([]);
        }

        shuffled.forEach((student, index) => {
            groups[index % numGroups].push(student);
        });

        renderGroups(groups);
    }

    function escapeHtml(str) {
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }

    function renderGroups(groups) {
        const container = document.getElementById('groups-output');
        const colors = 8;

        container.innerHTML = groups.map((group, i) => {
            const colorClass = 'group-color-' + (i % colors);
            const members = group.map(name =>
                `<li class="group-member">${escapeHtml(name)}</li>`
            ).join('');

            return `
                <div class="group-card ${colorClass}" style="animation-delay: ${i * 0.05}s">
                    <div class="group-header">
                        <div class="group-number">${i + 1}</div>
                        <span class="group-label">Grupp ${i + 1} (${group.length} st)</span>
                    </div>
                    <ul class="group-members">${members}</ul>
                </div>`;
        }).join('');
    }

    // ===== PICK RANDOM STUDENT =====
    function pickRandomStudent() {
        const students = getStudents();
        if (students.length === 0) {
            alert('Skriv in elevnamn i klasslistan forst!');
            return;
        }

        // Switch to picker tab
        const pickerTabBtn = document.querySelectorAll('.tab-btn')[1];
        switchTab('picker', pickerTabBtn);

        const resultEl = document.getElementById('picker-result');
        resultEl.classList.remove('highlight');
        resultEl.classList.add('spinning');

        let spins = 0;
        const maxSpins = 20;
        const interval = setInterval(() => {
            resultEl.textContent = students[Math.floor(Math.random() * students.length)];
            spins++;
            if (spins >= maxSpins) {
                clearInterval(interval);
                resultEl.classList.remove('spinning');

                const chosen = students[Math.floor(Math.random() * students.length)];
                resultEl.textContent = chosen;
                resultEl.classList.add('highlight');

                // Add to history
                pickerHistory.unshift(chosen);
                if (pickerHistory.length > 15) pickerHistory.pop();
                renderPickerHistory();
            }
        }, 80 + spins * 8);
    }

    function renderPickerHistory() {
        const container = document.getElementById('picker-history');
        container.innerHTML = pickerHistory.map(name =>
            `<span class="picker-history-item">${escapeHtml(name)}</span>`
        ).join('');
    }

    // ===== TABS =====
    function switchTab(tab, btn) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('tab-' + tab).classList.add('active');
    }

    // ===== INIT =====
    loadClassList();
    </script>
</body>
</html>
