<main class="page-wrapper">

</main>

// Wire up result display to use correct element IDs
const _origShowResult = showResult;
// Override to map our element IDs
function showResult() {
  const total = quizOrder.length;
  const pct = Math.round(quizScore / total * 100);

  const quizMain = document.getElementById('quiz-main');
  if (quizMain) quizMain.style.display = 'none';

  const result = document.getElementById('quiz-result');
  if (!result) return;
  result.classList.add('visible');

  document.getElementById('result-score').textContent = pct + '%';
  document.getElementById('result-label').textContent = quizScore + ' av ' + total + ' rätt';
  document.getElementById('result-correct').textContent = quizScore;
  document.getElementById('result-wrong').textContent = total - quizScore;

  let feedback = '';
  if (pct >= 90) feedback = '🏆 Utmärkt! Du behärskar AI-kunskapen på en hög nivå.';
  else if (pct >= 70) feedback = '👍 Bra jobbat! Du har ett solitt grepp om ämnet.';
  else if (pct >= 50) feedback = '📖 Halvvägs! Repetera kapitlen och försök igen.';
  else feedback = '💪 Fortsätt läsa! Läromedlet hjälper dig att komma upp i fart.';
  document.getElementById('result-feedback').textContent = feedback;

  const reviewEl = document.getElementById('quiz-review');
  if (reviewEl) {
    reviewEl.innerHTML = '<h3 style="margin-bottom:1rem;font-size:1.1rem">Genomgång av alla frågor</h3>' +
      quizAnswers.map(a => {
        const q = quizQuestions[a.qi];
        const correctOpt = q.options[q.correctIndex];
        return '<div class="review-item ' + (a.correct ? 'correct' : 'wrong') + '">' +
          '<div class="review-q">' + q.question + '</div>' +
          '<div class="review-a">' +
          (a.correct ? '✅' : '❌') + ' Du svarade: ' + a.userText + '<br>' +
          (!a.correct ? '✅ Rätt svar: ' + correctOpt + '<br>' : '') +
          '<em>' + q.explanation + '</em>' +
          '</div></div>';
      }).join('');
  }
}
