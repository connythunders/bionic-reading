<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bryssel Jeopardy 🇧🇪</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Georgia', serif;
    background: #060D6E;
    color: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  h1 {
    font-size: clamp(1.4rem, 4vw, 2.4rem);
    text-align: center;
    padding: 20px 10px 8px;
    color: #FFD700;
    text-shadow: 2px 2px 4px #000;
    letter-spacing: 2px;
    font-style: italic;
  }

  .subtitle {
    color: #aac4ff;
    font-size: 0.95rem;
    margin-bottom: 18px;
    text-align: center;
  }

  /* Score board */
  .scoreboard {
    display: flex;
    gap: 20px;
    margin-bottom: 16px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .team {
    background: #0a1580;
    border: 2px solid #FFD700;
    border-radius: 8px;
    padding: 8px 20px;
    text-align: center;
    min-width: 130px;
  }

  .team-name {
    font-size: 0.85rem;
    color: #aac4ff;
    margin-bottom: 4px;
  }

  .team-score {
    font-size: 1.8rem;
    font-weight: bold;
    color: #FFD700;
  }

  .team-score.negative { color: #ff6b6b; }

  /* Board */
  .board-wrapper {
    width: 100%;
    max-width: 960px;
    padding: 0 6px 30px;
    overflow-x: auto;
  }

  .board {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 4px;
    min-width: 580px;
  }

  .category-header {
    background: #060D6E;
    border: 2px solid #FFD700;
    color: #FFD700;
    text-align: center;
    padding: 12px 6px;
    font-size: clamp(0.6rem, 1.5vw, 0.85rem);
    font-weight: bold;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    min-height: 70px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .cell {
    background: #060D6E;
    border: 2px solid #1a2fa0;
    color: #FFD700;
    text-align: center;
    font-size: clamp(1rem, 2.5vw, 1.6rem);
    font-weight: bold;
    font-style: italic;
    cursor: pointer;
    min-height: 70px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, transform 0.1s;
    user-select: none;
  }

  .cell:hover:not(.used) {
    background: #1a2fa0;
    transform: scale(1.03);
  }

  .cell.used {
    background: #020840;
    color: #020840;
    cursor: default;
    border-color: #020840;
  }

  .cell.daily-double {
    background: linear-gradient(135deg, #060D6E 60%, #b8860b 100%);
  }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,20,0.88);
    z-index: 100;
    justify-content: center;
    align-items: center;
    padding: 16px;
  }

  .modal-overlay.active { display: flex; }

  .modal {
    background: #060D6E;
    border: 3px solid #FFD700;
    border-radius: 12px;
    max-width: 680px;
    width: 100%;
    padding: 32px 28px 24px;
    text-align: center;
    position: relative;
    box-shadow: 0 0 40px rgba(255,215,0,0.3);
  }

  .modal-points {
    font-size: 1rem;
    color: #aac4ff;
    margin-bottom: 10px;
  }

  .modal-category {
    font-size: 0.85rem;
    color: #FFD700;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 16px;
  }

  .modal-clue {
    font-size: clamp(1rem, 3vw, 1.5rem);
    line-height: 1.5;
    color: #fff;
    margin-bottom: 24px;
    min-height: 60px;
  }

  .modal-answer {
    background: #020840;
    border: 2px solid #FFD700;
    border-radius: 8px;
    padding: 14px 18px;
    font-size: clamp(0.9rem, 2.5vw, 1.2rem);
    color: #FFD700;
    display: none;
    margin-bottom: 20px;
  }

  .modal-answer.visible { display: block; }

  .btn-row {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
  }

  button {
    padding: 10px 22px;
    border: 2px solid #FFD700;
    border-radius: 6px;
    font-size: 0.95rem;
    font-weight: bold;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }

  .btn-reveal {
    background: #FFD700;
    color: #060D6E;
  }

  .btn-reveal:hover { background: #fff; }

  .btn-correct {
    background: transparent;
    color: #4cff7a;
    border-color: #4cff7a;
  }

  .btn-correct:hover { background: #4cff7a; color: #000; }

  .btn-wrong {
    background: transparent;
    color: #ff6b6b;
    border-color: #ff6b6b;
  }

  .btn-wrong:hover { background: #ff6b6b; color: #fff; }

  .btn-close {
    background: transparent;
    color: #aac4ff;
    border-color: #aac4ff;
    font-size: 0.85rem;
    padding: 8px 16px;
  }

  .btn-close:hover { background: #aac4ff; color: #000; }

  /* Team picker inside modal */
  .team-picker {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }

  .btn-team {
    background: transparent;
    color: #fff;
    border-color: #aac4ff;
    font-size: 0.85rem;
    padding: 6px 14px;
  }

  .btn-team.selected { background: #FFD700; color: #060D6E; border-color: #FFD700; }

  /* Daily double banner */
  .dd-banner {
    font-size: 2rem;
    color: #FFD700;
    font-style: italic;
    font-weight: bold;
    margin-bottom: 10px;
    text-shadow: 2px 2px 6px #000;
    display: none;
  }

  /* Final scores */
  .final-section {
    display: none;
    text-align: center;
    padding: 20px;
    animation: fadeIn 0.5s;
  }

  @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:none; } }

  .winner-text {
    font-size: 2rem;
    color: #FFD700;
    font-style: italic;
    font-weight: bold;
    margin-bottom: 12px;
  }

  /* Controls */
  .controls {
    display: flex;
    gap: 10px;
    margin-bottom: 14px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .add-team-btn {
    background: transparent;
    color: #aac4ff;
    border: 2px solid #aac4ff;
    font-size: 0.85rem;
    padding: 6px 14px;
  }

  .add-team-btn:hover { background: #aac4ff; color: #000; }

  .team-name-input {
    background: #0a1580;
    border: 2px solid #FFD700;
    color: #fff;
    padding: 4px 10px;
    font-size: 0.9rem;
    border-radius: 4px;
    width: 110px;
    text-align: center;
  }
</style>
</head>
<body>

<h1>🇧🇪 BRYSSEL JEOPARDY</h1>
<p class="subtitle">14–17 maj 2026 &mdash; Hur väl känner du till resan?</p>

<div class="scoreboard" id="scoreboard"></div>

<div class="controls">
  <button class="add-team-btn" onclick="addTeam()">+ Lägg till lag</button>
  <button class="add-team-btn" style="border-color:#ff6b6b;color:#ff6b6b" onclick="resetGame()">↺ Nytt spel</button>
</div>

<div class="board-wrapper">
  <div class="board" id="board"></div>
</div>

<div class="final-section" id="finalSection">
  <div class="winner-text" id="winnerText"></div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-category" id="modalCategory"></div>
    <div class="dd-banner" id="ddBanner">⭐ DAILY DOUBLE ⭐</div>
    <div class="modal-points" id="modalPoints"></div>
    <div class="modal-clue" id="modalClue"></div>
    <div class="modal-answer" id="modalAnswer"></div>

    <div class="btn-row" id="revealRow">
      <button class="btn-reveal" onclick="revealAnswer()">Visa svar</button>
      <button class="btn-close" onclick="closeModal()">Stäng</button>
    </div>

    <div class="btn-row" id="scoreRow" style="display:none; flex-direction:column; gap:12px; align-items:center">
      <div style="font-size:0.85rem;color:#aac4ff;">Vilket lag svarade?</div>
      <div class="team-picker" id="teamPicker"></div>
      <div class="btn-row">
        <button class="btn-correct" onclick="score(true)">✓ Rätt</button>
        <button class="btn-wrong" onclick="score(false)">✗ Fel</button>
        <button class="btn-close" onclick="closeModal()">Stäng</button>
      </div>
    </div>
  </div>
</div>

<script>
// ─────────────────────────────────────────────
//  DATA
// ─────────────────────────────────────────────
const categories = [
  "🍺 Öl & Bryggeri",
  "🍽️ Restauranger",
  "🚆 Transport",
  "🎨 Kultur & Museer",
  "🏙️ Gent",
  "📅 Fakta & Tips"
];

// [points, clue (what you read aloud), answer (the correct response)]
// Daily double marked with dd:true
const questions = [
  // Öl & Bryggeri
  [
    { p:100, clue:"Anledningen till att vi inte besöker detta bryggeri på torsdagen – det är nämligen stängt på Kristi himmelsfärdsdag.",
      ans:"Cantillon Brewery" },
    { p:200, clue:"Självguidad tur på Cantillon kostar detta belopp per person och inkluderar tre provningar.",
      ans:"€9 (€8 reducerat)" },
    { p:300, clue:"Dessa tre typer av öl provar man på den självguidade turen på Cantillon.",
      ans:"Lambic, gueuze och en fruktblandning" },
    { p:400, clue:"Denna bar vid Place Fontainas har 40+ öl på fat och är ett av kvälle-alternativen på torsdagen.",
      ans:"Moeder Lambic Fontainas" },
    { p:500, clue:"På denna genterska bar måste du lämna en sko som pant för att få dricka ur det stora orgelpipsglaset.",
      ans:"Dulle Griet" },
  ],
  // Restauranger
  [
    { p:100, clue:"Denna Brysselbaserade restaurang ersätter Le Mary Celeste (som faktiskt ligger i Paris, inte Bryssel).",
      ans:"Le Tournant" },
    { p:200, clue:"Nüetnigenough tar inte emot detta – anledningen till att ni ska komma kl 18:00 när de öppnar.",
      ans:"Bokningar / reservationer" },
    { p:300, clue:"Le Tournants 3-rätters meny kostar detta belopp per person, och restaurangen har detta Michelin-utmärkelse.",
      ans:"€48 / Bib Gourmand" },
    { p:400, clue:"Denna restaurang i Saint-Gilles fokuserar på svamp och drivs av samma ägare som La Buvette.",
      ans:"Café des Spores" },
    { p:500, clue:"Fin de Siècle accepterar bara dessa två betalningsmetoder – se till att ha €80–100 redo.",
      ans:"Payconiq eller kontant" },
  ],
  // Transport
  [
    { p:100, clue:"Ungefärlig restid med tåg från Brussels Airport–Zaventem till Brussels Central.",
      ans:"18 minuter" },
    { p:200, clue:"Det dagliga taket för kontaktlöst STIB-kort – nås efter fyra resor samma dag.",
      ans:"€8,50" },
    { p:300, clue:"Restid med tåg mellan Bryssel och Gent i 2:a klass.",
      ans:"28–36 minuter" },
    { p:400, clue:"Tåglinje med det här namnet kör från flygplatsen till Brussels Central var 15:e minut.",
      ans:"Diabolo" },
    { p:500, clue:"Priset för en enkelresa med STIB-buss nr 12 ('Airport2City') med kontaktlöst kort.",
      ans:"€7,50" },
  ],
  // Kultur & Museer
  [
    { p:100, clue:"Biljettpriset för en vuxen till Magritte Museum, som inkluderar ljudguide.",
      ans:"€10" },
    { p:200, clue:"MIM – dessa tre ord på svenska.",
      ans:"Musical Instruments Museum (Musikinstrumentmuseet)" },
    { p:300, clue:"Klockslag då Place du Jeu de Balle loppis stänger på vardagar.",
      ans:"14:00" },
    { p:400, clue:"Denna art déco-jazzbar på Rue Antoine Dansaert 6 öppnar varje dag 16:00 och man ringer på dörrklockan för att komma in.",
      ans:"L'Archiduc" },
    { p:500, clue:"Lammets tillbedjan av van Eyck hänger i denna katedral i Gent; altarskåpet enbart kostar €12,50.",
      ans:"Sint-Baafskathedraal" },
  ],
  // Gent
  [
    { p:100, clue:"Denna lunchrestaurang på Guldenspoorstraat 29 drivs av tidigare Michelin-kocken Kobe Desramaults och bakar sourdough-pizza i vedugn.",
      ans:"De Superette" },
    { p:200, clue:"Inträdesavgiften per vuxen för Gravensteen – Grevarnas slott.",
      ans:"€15" },
    { p:300, clue:"Dessa två medeltida hamnkvarter längs floden Leie är ett ikoniskt fotomotiv sett från Sint-Michielsbrug.",
      ans:"Graslei & Korenlei" },
    { p:400, clue:"De Superette är stängt dessa fyra veckodagar.",
      ans:"Söndag, måndag, tisdag och onsdag (stängt sön–ons)" },
    { p:500, clue:"Priset för en 40 minuters båttur på Gents kanaler, med avgång från Korenlei/Graslei var 20:e minut.",
      ans:"~€10" },
  ],
  // Fakta & Tips
  [
    { p:100, clue:"Torsdag 14 maj 2026 är denna svenska benämning på helgdagen.",
      ans:"Kristi himmelsfärdsdag" },
    { p:200, clue:"Denna restaurang i Gent är känd för sina gigantiska köttbullar och fungerar som backup till De Superette.",
      ans:"Balls & Glory" },
    { p:300, clue:"Antal provningar som ingår i Cantillons självguidade tur.",
      ans:"3 (tre)" },
    { p:400, clue:"Priset för ett STIB-dagskort i Bryssel.",
      ans:"€9,10" },
    { p:500, clue:"Dessa två belgiska chokladbutiker på Place du Grand Sablon är öppna även på helgdagen torsdag.",
      ans:"Pierre Marcolini och Wittamer" },
  ],
];

// Mark one Daily Double (category 0, row 3 = 400-clue)
questions[0][3].dd = true;

// ─────────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────────
let teams = [
  { name: "Lag 1", score: 0 },
  { name: "Lag 2", score: 0 },
];
let usedCells = new Set();
let currentCell = null; // {cat, row}
let selectedTeam = 0;
let answerRevealed = false;

// ─────────────────────────────────────────────
//  RENDER
// ─────────────────────────────────────────────
function renderScoreboard() {
  const sb = document.getElementById('scoreboard');
  sb.innerHTML = teams.map((t, i) => `
    <div class="team">
      <div class="team-name">
        <input class="team-name-input" value="${t.name}" oninput="teams[${i}].name=this.value;renderScoreboard()" />
      </div>
      <div class="team-score ${t.score < 0 ? 'negative' : ''}">€${t.score}</div>
    </div>
  `).join('');
}

function renderBoard() {
  const board = document.getElementById('board');
  board.innerHTML = '';

  categories.forEach(cat => {
    const hdr = document.createElement('div');
    hdr.className = 'category-header';
    hdr.textContent = cat;
    board.appendChild(hdr);
  });

  for (let row = 0; row < 5; row++) {
    for (let cat = 0; cat < 6; cat++) {
      const q = questions[cat][row];
      const key = `${cat}-${row}`;
      const cell = document.createElement('div');
      cell.className = 'cell' + (usedCells.has(key) ? ' used' : '') + (q.dd && !usedCells.has(key) ? ' daily-double' : '');
      cell.textContent = usedCells.has(key) ? '' : `€${q.p}`;
      cell.dataset.cat = cat;
      cell.dataset.row = row;
      if (!usedCells.has(key)) {
        cell.addEventListener('click', () => openModal(cat, row));
      }
      board.appendChild(cell);
    }
  }

  checkAllUsed();
}

function checkAllUsed() {
  if (usedCells.size === 30) {
    showFinal();
  }
}

function showFinal() {
  const best = teams.reduce((a,b) => a.score >= b.score ? a : b);
  const tied = teams.filter(t => t.score === best.score);
  const fs = document.getElementById('finalSection');
  const wt = document.getElementById('winnerText');
  fs.style.display = 'block';
  if (tied.length > 1) {
    wt.textContent = `🤝 Oavgjort! ${tied.map(t=>t.name).join(' & ')} delar vinsten med €${best.score}`;
  } else {
    wt.textContent = `🏆 ${best.name} vinner med €${best.score}!`;
  }
}

// ─────────────────────────────────────────────
//  MODAL
// ─────────────────────────────────────────────
function openModal(cat, row) {
  const q = questions[cat][row];
  currentCell = { cat, row };
  answerRevealed = false;
  selectedTeam = 0;

  document.getElementById('modalCategory').textContent = categories[cat];
  document.getElementById('modalPoints').textContent = `€${q.p}`;
  document.getElementById('modalClue').textContent = q.clue;
  document.getElementById('modalAnswer').textContent = `Svar: ${q.ans}`;
  document.getElementById('modalAnswer').classList.remove('visible');

  const ddBanner = document.getElementById('ddBanner');
  ddBanner.style.display = q.dd ? 'block' : 'none';

  document.getElementById('revealRow').style.display = 'flex';
  document.getElementById('scoreRow').style.display = 'none';

  document.getElementById('modalOverlay').classList.add('active');
}

function revealAnswer() {
  document.getElementById('modalAnswer').classList.add('visible');
  answerRevealed = true;

  document.getElementById('revealRow').style.display = 'none';
  document.getElementById('scoreRow').style.display = 'flex';

  renderTeamPicker();
}

function renderTeamPicker() {
  const picker = document.getElementById('teamPicker');
  picker.innerHTML = teams.map((t, i) => `
    <button class="btn-team ${selectedTeam === i ? 'selected' : ''}" onclick="selectTeam(${i})">${t.name}</button>
  `).join('');
}

function selectTeam(i) {
  selectedTeam = i;
  renderTeamPicker();
}

function score(correct) {
  const q = questions[currentCell.cat][currentCell.row];
  if (correct) {
    teams[selectedTeam].score += q.p;
  } else {
    teams[selectedTeam].score -= q.p;
  }
  closeModal();
}

function closeModal() {
  if (currentCell) {
    const key = `${currentCell.cat}-${currentCell.row}`;
    usedCells.add(key);
    currentCell = null;
  }
  document.getElementById('modalOverlay').classList.remove('active');
  renderScoreboard();
  renderBoard();
}

// ─────────────────────────────────────────────
//  TEAM MANAGEMENT
// ─────────────────────────────────────────────
function addTeam() {
  if (teams.length >= 6) return;
  teams.push({ name: `Lag ${teams.length + 1}`, score: 0 });
  renderScoreboard();
}

function resetGame() {
  if (!confirm('Starta om spelet? Alla poäng nollställs.')) return;
  usedCells.clear();
  teams.forEach(t => t.score = 0);
  document.getElementById('finalSection').style.display = 'none';
  renderScoreboard();
  renderBoard();
}

// Close modal on overlay click
document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// ─────────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────────
renderScoreboard();
renderBoard();
</script>
</body>
</html>
