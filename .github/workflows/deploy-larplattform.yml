name: Driftsätt lärplattformen

# SETUP: Gå till Settings → Pages → Source och välj "GitHub Actions"
# Appen blir tillgänglig på: https://bionicreading.se/larplattform/

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: larplattform/package-lock.json

      - name: Installera beroenden
        working-directory: larplattform
        run: npm ci

      - name: Bygg React-appen
        working-directory: larplattform
        run: npm run build
        env:
          GITHUB_ACTIONS: 'true'

      - name: Förbered hela sajten
        run: |
          mkdir -p _site/larplattform

          # Kopiera hela repots rotkatalog (exkludera källa, bygg-artefakter och git)
          rsync -a \
            --exclude='.git' \
            --exclude='larplattform' \
            --exclude='_site' \
            --exclude='node_modules' \
            . _site/

          # React-appens build-output
          cp -r larplattform/dist/. _site/larplattform/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}larplattform/
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
