name: Uppdatera Partierna-nyheter

on:
  schedule:
    - cron: '10 * * * *'   # Varje timme
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: Main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Hämta partiernas nyheter
        run: python scripts/fetch-partierna-nyheter.py

      - name: Committa och pusha
        run: |
          git config user.name  "Partierna News Bot"
          git config user.email "partierna-bot@users.noreply.github.com"
          git add partierna-data.json
          git diff --staged --quiet || git commit -m "Auto: Partierna-nyheter $(date -u '+%Y-%m-%d %H:%M') UTC"
          git push
