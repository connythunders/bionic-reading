<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Onboarding – Hemtjänsten</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-primary: #1e3a5f;
      --color-primary-light: #2d5085;
      --color-accent: #e87e4f;
      --color-success: #4a8c5e;
      --color-success-bg: #eaf5ee;
      --color-bg: #f7f5f2;
      --color-card: #ffffff;
      --color-text: #2a2a2a;
      --color-text-muted: #6b6b6b;
      --color-border: #e5e1dc;
      --radius-lg: 16px;
      --radius-md: 12px;
      --radius-sm: 8px;
      --shadow-card: 0 2px 8px rgba(0,0,0,0.06);
      --shadow-card-hover: 0 4px 16px rgba(0,0,0,0.1);
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      font-size: 17px;
      line-height: 1.6;
      color: var(--color-text);
      background-color: var(--color-bg);
      min-height: 100vh;
    }

    /* ===== LAYOUT ===== */
    .app-container {
      max-width: 760px;
      margin: 0 auto;
      padding: 0 24px 64px;
    }

    /* ===== HEADER ===== */
    .app-header {
      background: var(--color-primary);
      color: white;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 12px rgba(0,0,0,0.15);
    }

    .header-inner {
      max-width: 760px;
      margin: 0 auto;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-back {
      display: none;
      background: none;
      border: none;
      color: white;
      cursor: pointer;
      padding: 6px 8px 6px 4px;
      border-radius: var(--radius-sm);
      font-size: 20px;
      line-height: 1;
      transition: background 0.15s;
      flex-shrink: 0;
    }

    .header-back:hover,
    .header-back:focus-visible {
      background: rgba(255,255,255,0.15);
      outline: 2px solid var(--color-accent);
      outline-offset: 2px;
    }

    .header-title {
      flex: 1;
      font-size: 17px;
      font-weight: 600;
      line-height: 1.3;
    }

    .header-title small {
      display: block;
      font-size: 12px;
      font-weight: 400;
      opacity: 0.75;
    }

    .header-settings {
      background: none;
      border: none;
      color: white;
      cursor: pointer;
      padding: 6px;
      border-radius: var(--radius-sm);
      font-size: 20px;
      line-height: 1;
      transition: background 0.15s;
      flex-shrink: 0;
    }

    .header-settings:hover,
    .header-settings:focus-visible {
      background: rgba(255,255,255,0.15);
      outline: 2px solid var(--color-accent);
      outline-offset: 2px;
    }

    /* ===== VIEWS ===== */
    .view {
      display: none;
    }

    .view.active {
      display: block;
    }

    /* ===== HOME VIEW ===== */
    .welcome-section {
      background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-primary-light) 100%);
      color: white;
      border-radius: var(--radius-lg);
      padding: 28px 24px;
      margin: 24px 0 20px;
      position: relative;
      overflow: hidden;
    }

    .welcome-section::after {
      content: '';
      position: absolute;
      right: -20px;
      top: -20px;
      width: 120px;
      height: 120px;
      background: rgba(255,255,255,0.06);
      border-radius: 50%;
    }

    .welcome-section h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .welcome-section p {
      opacity: 0.88;
      font-size: 15px;
    }

    /* ===== PROGRESS TOTAL ===== */
    .total-progress {
      background: var(--color-card);
      border-radius: var(--radius-md);
      padding: 18px 20px;
      margin-bottom: 20px;
      box-shadow: var(--shadow-card);
    }

    .progress-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      font-size: 15px;
    }

    .progress-label strong {
      color: var(--color-primary);
      font-weight: 600;
    }

    .progress-label span {
      color: var(--color-text-muted);
      font-size: 13px;
    }

    .progress-bar-wrap {
      background: var(--color-border);
      border-radius: 99px;
      height: 8px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      border-radius: 99px;
      background: linear-gradient(90deg, var(--color-primary) 0%, var(--color-accent) 100%);
      transition: width 0.3s ease;
      min-width: 0;
    }

    @media (prefers-reduced-motion: reduce) {
      .progress-bar-fill {
        transition: none;
      }
    }

    /* ===== SEARCH ===== */
    .search-wrap {
      position: relative;
      margin-bottom: 20px;
    }

    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 16px;
      pointer-events: none;
      opacity: 0.5;
    }

    .search-input {
      width: 100%;
      padding: 12px 14px 12px 42px;
      border: 2px solid var(--color-border);
      border-radius: var(--radius-md);
      font-family: inherit;
      font-size: 16px;
      background: var(--color-card);
      color: var(--color-text);
      transition: border-color 0.15s;
      -webkit-appearance: none;
    }

    .search-input:focus {
      outline: none;
      border-color: var(--color-primary);
    }

    .search-input::placeholder {
      color: var(--color-text-muted);
    }

    .no-results {
      display: none;
      text-align: center;
      color: var(--color-text-muted);
      padding: 32px 0;
      font-size: 15px;
    }

    /* ===== SECTION CARDS ===== */
    .sections-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }

    .section-card {
      background: var(--color-card);
      border-radius: var(--radius-lg);
      padding: 20px;
      box-shadow: var(--shadow-card);
      cursor: pointer;
      border: 2px solid transparent;
      transition: box-shadow 0.15s, border-color 0.15s, transform 0.1s;
      text-align: left;
      width: 100%;
      font-family: inherit;
      color: var(--color-text);
    }

    .section-card:hover {
      box-shadow: var(--shadow-card-hover);
      border-color: var(--color-border);
      transform: translateY(-1px);
    }

    .section-card:focus-visible {
      outline: 2px solid var(--color-accent);
      outline-offset: 2px;
    }

    .section-card.completed {
      border-color: var(--color-success);
      background: linear-gradient(135deg, #fff 0%, #f0faf3 100%);
    }

    .card-icon {
      font-size: 28px;
      margin-bottom: 10px;
      display: block;
      line-height: 1;
    }

    .card-title {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 4px;
      line-height: 1.3;
    }

    .card-summary {
      font-size: 13px;
      color: var(--color-text-muted);
      margin-bottom: 12px;
      line-height: 1.4;
    }

    .card-progress {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card-progress-bar {
      flex: 1;
      background: var(--color-border);
      border-radius: 99px;
      height: 5px;
      overflow: hidden;
    }

    .card-progress-fill {
      height: 100%;
      border-radius: 99px;
      background: linear-gradient(90deg, var(--color-primary), var(--color-accent));
      transition: width 0.3s ease;
    }

    .card-progress-text {
      font-size: 12px;
      color: var(--color-text-muted);
      white-space: nowrap;
      font-weight: 500;
    }

    .card-done-badge {
      display: none;
      font-size: 11px;
      font-weight: 600;
      color: var(--color-success);
      background: var(--color-success-bg);
      padding: 2px 8px;
      border-radius: 99px;
    }

    .section-card.completed .card-done-badge {
      display: inline-block;
    }

    /* ===== CONGRATS BANNER ===== */
    .congrats-banner {
      display: none;
      background: linear-gradient(135deg, var(--color-success) 0%, #3a7a50 100%);
      color: white;
      border-radius: var(--radius-lg);
      padding: 24px;
      margin-bottom: 20px;
      text-align: center;
    }

    .congrats-banner.show {
      display: block;
    }

    .congrats-banner .congrats-emoji {
      font-size: 40px;
      display: block;
      margin-bottom: 8px;
    }

    .congrats-banner h2 {
      font-size: 20px;
      margin-bottom: 6px;
    }

    .congrats-banner p {
      font-size: 15px;
      opacity: 0.9;
    }

    /* ===== SECTION DETAIL VIEW ===== */
    .section-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 24px 0 8px;
    }

    .section-header-icon {
      font-size: 36px;
      line-height: 1;
      flex-shrink: 0;
    }

    .section-header h2 {
      font-size: 22px;
      font-weight: 700;
      color: var(--color-primary);
      line-height: 1.2;
    }

    .section-progress-bar {
      background: var(--color-card);
      border-radius: var(--radius-md);
      padding: 14px 18px;
      margin-bottom: 20px;
      box-shadow: var(--shadow-card);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .section-progress-text {
      font-size: 14px;
      color: var(--color-text-muted);
      white-space: nowrap;
      font-weight: 500;
      min-width: 60px;
    }

    .section-progress-bar .progress-bar-wrap {
      flex: 1;
    }

    /* ===== CONTENT ===== */
    .section-content {
      background: var(--color-card);
      border-radius: var(--radius-lg);
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: var(--shadow-card);
    }

    .section-content h3 {
      font-size: 16px;
      font-weight: 600;
      color: var(--color-primary);
      margin: 20px 0 8px;
    }

    .section-content h3:first-child {
      margin-top: 0;
    }

    .section-content p {
      margin-bottom: 12px;
      font-size: 16px;
    }

    .section-content p:last-child {
      margin-bottom: 0;
    }

    .section-content ul,
    .section-content ol {
      padding-left: 20px;
      margin-bottom: 12px;
    }

    .section-content li {
      margin-bottom: 6px;
      font-size: 16px;
    }

    .section-content blockquote {
      border-left: 4px solid var(--color-accent);
      padding: 12px 16px;
      margin: 12px 0;
      background: #fef9f6;
      border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
      font-style: italic;
      color: var(--color-text-muted);
      font-size: 15px;
    }

    /* ===== CHECKLIST ===== */
    .checklist-section {
      background: var(--color-card);
      border-radius: var(--radius-lg);
      padding: 20px 24px;
      margin-bottom: 20px;
      box-shadow: var(--shadow-card);
    }

    .checklist-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--color-primary);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .checklist-item {
      display: flex;
      align-items: flex-start;
      gap: 0;
      margin-bottom: 8px;
    }

    .checklist-item:last-child {
      margin-bottom: 0;
    }

    .checklist-item input[type="checkbox"] {
      position: absolute;
      opacity: 0;
      width: 0;
      height: 0;
    }

    .checklist-item label {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      min-height: 48px;
      padding: 8px 12px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: background 0.15s;
      font-size: 15px;
      border: 2px solid transparent;
    }

    .checklist-item label:hover {
      background: var(--color-bg);
    }

    .checklist-item input:focus-visible + label {
      outline: 2px solid var(--color-accent);
      outline-offset: 2px;
    }

    .checklist-item input:checked + label {
      background: var(--color-success-bg);
    }

    .check-box {
      width: 24px;
      height: 24px;
      border: 2px solid var(--color-border);
      border-radius: 6px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      background: white;
    }

    .checklist-item input:checked + label .check-box {
      background: var(--color-success);
      border-color: var(--color-success);
    }

    .check-icon {
      display: none;
      font-size: 14px;
      color: white;
      font-weight: 700;
      line-height: 1;
    }

    .checklist-item input:checked + label .check-icon {
      display: block;
    }

    .check-text {
      flex: 1;
      line-height: 1.4;
    }

    /* Section completion celebration */
    .section-complete-msg {
      display: none;
      text-align: center;
      padding: 16px;
      color: var(--color-success);
      font-weight: 600;
      font-size: 16px;
      animation: popIn 0.3s ease;
    }

    .section-complete-msg.show {
      display: block;
    }

    @keyframes popIn {
      0% { transform: scale(0.8); opacity: 0; }
      60% { transform: scale(1.05); }
      100% { transform: scale(1); opacity: 1; }
    }

    @media (prefers-reduced-motion: reduce) {
      .section-complete-msg {
        animation: none;
      }
    }

    /* ===== NAVIGATION BUTTONS ===== */
    .section-nav {
      display: flex;
      gap: 12px;
      margin-top: 8px;
    }

    .btn-primary {
      flex: 1;
      background: var(--color-primary);
      color: white;
      border: none;
      border-radius: var(--radius-md);
      padding: 14px 20px;
      font-family: inherit;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      text-align: center;
    }

    .btn-primary:hover {
      background: var(--color-primary-light);
    }

    .btn-primary:focus-visible {
      outline: 2px solid var(--color-accent);
      outline-offset: 2px;
    }

    .btn-secondary {
      background: var(--color-card);
      color: var(--color-text);
      border: 2px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: 12px 20px;
      font-family: inherit;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }

    .btn-secondary:hover {
      border-color: var(--color-primary);
      background: var(--color-bg);
    }

    .btn-secondary:focus-visible {
      outline: 2px solid var(--color-accent);
      outline-offset: 2px;
    }

    /* ===== SETTINGS MODAL ===== */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 200;
      align-items: flex-end;
      justify-content: center;
    }

    .modal-overlay.open {
      display: flex;
    }

    .modal {
      background: var(--color-card);
      border-radius: var(--radius-lg) var(--radius-lg) 0 0;
      padding: 24px;
      width: 100%;
      max-width: 760px;
    }

    .modal h2 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 16px;
      color: var(--color-primary);
    }

    .modal-actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .btn-danger {
      background: #fee2e2;
      color: #b91c1c;
      border: none;
      border-radius: var(--radius-md);
      padding: 14px 20px;
      font-family: inherit;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-danger:hover {
      background: #fca5a5;
    }

    .btn-danger:focus-visible {
      outline: 2px solid #b91c1c;
      outline-offset: 2px;
    }

    .btn-close {
      background: var(--color-bg);
      color: var(--color-text-muted);
      border: none;
      border-radius: var(--radius-md);
      padding: 14px 20px;
      font-family: inherit;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-close:hover {
      background: var(--color-border);
    }

    .btn-close:focus-visible {
      outline: 2px solid var(--color-accent);
      outline-offset: 2px;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 540px) {
      body {
        font-size: 18px;
      }

      .app-container {
        padding: 0 16px 64px;
      }

      .header-inner {
        padding: 12px 16px;
      }

      .sections-grid {
        grid-template-columns: 1fr;
      }

      .welcome-section h1 {
        font-size: 20px;
      }

      .section-header h2 {
        font-size: 19px;
      }

      .section-content {
        padding: 18px;
      }
    }

    /* ===== PRINT ===== */
    @media print {
      .app-header,
      .search-wrap,
      .header-settings,
      .header-back,
      .section-nav,
      .modal-overlay {
        display: none !important;
      }

      .view {
        display: block !important;
      }

      .app-container {
        max-width: 100%;
        padding: 0;
      }

      .section-card {
        break-inside: avoid;
        page-break-inside: avoid;
      }

      .section-content,
      .checklist-section {
        box-shadow: none;
        border: 1px solid #ccc;
      }

      .section-detail {
        page-break-before: always;
      }

      .section-detail:first-child {
        page-break-before: auto;
      }

      body {
        background: white;
        font-size: 12pt;
      }

      .total-progress {
        display: none;
      }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header class="app-header" role="banner">
    <div class="header-inner">
      <button class="header-back" id="btnBack" aria-label="Gå tillbaka till startsidan">←</button>
      <div class="header-title">
        <span id="headerTitle">Hemtjänsten</span>
        <small id="headerSubtitle">Onboarding för nyanställda</small>
      </div>
      <button class="header-settings" id="btnSettings" aria-label="Inställningar">⚙️</button>
    </div>
  </header>

  <!-- SETTINGS MODAL -->
  <div class="modal-overlay" id="settingsModal" role="dialog" aria-modal="true" aria-label="Inställningar">
    <div class="modal">
      <h2>Inställningar</h2>
      <div class="modal-actions">
        <button class="btn-primary" onclick="window.print()">🖨️ Skriv ut</button>
        <button class="btn-danger" id="btnReset">🗑️ Nollställ allt framsteg</button>
        <button class="btn-close" id="btnCloseModal">Stäng</button>
      </div>
    </div>
  </div>

  <!-- MAIN CONTENT -->
  <main>
    <div class="app-container">

      <!-- HOME VIEW -->
      <section class="view active" id="viewHome" aria-label="Startsida">

        <div class="welcome-section" role="banner">
          <h1 id="homeTitle">Välkommen till hemtjänsten</h1>
          <p>Gå igenom alla åtta avsnitt och kryssa i checklistorna när du är klar med varje moment.</p>
        </div>

        <div class="congrats-banner" id="congratsBanner" role="status">
          <span class="congrats-emoji">🎉</span>
          <h2>Grattis – du är klar!</h2>
          <p>Du har slutfört alla moment i onboardingen. Välkommen till teamet!</p>
        </div>

        <div class="total-progress">
          <div class="progress-label">
            <strong>Ditt framsteg</strong>
            <span aria-live="polite" id="progressText">Laddar…</span>
          </div>
          <div class="progress-bar-wrap" role="progressbar" aria-valuemin="0" aria-valuemax="100" id="totalProgressBar" aria-label="Totalt framsteg">
            <div class="progress-bar-fill" id="totalProgressFill" style="width:0%"></div>
          </div>
        </div>

        <div class="search-wrap">
          <span class="search-icon" aria-hidden="true">🔍</span>
          <input
            type="search"
            class="search-input"
            id="searchInput"
            placeholder="Sök bland avsnitt…"
            aria-label="Sök bland avsnitt"
            autocomplete="off"
          >
        </div>

        <p class="no-results" id="noResults" role="status"></p>

        <div class="sections-grid" id="sectionsGrid" role="list">
          <!-- cards injected by JS -->
        </div>

      </section>

      <!-- SECTION DETAIL VIEW -->
      <article class="view" id="viewSection" aria-label="Avsnittsdetalj">
        <!-- injected by JS -->
      </article>

    </div>
  </main>

  <script src="data.js"></script>
  <script>
    const STORAGE_KEY = 'onboarding-hemtjanst-progress';

    /* ---- State ---- */
    let progress = loadProgress();
    let currentSectionIndex = -1;

    /* ---- Init ---- */
    document.addEventListener('DOMContentLoaded', () => {
      const komunName = onboardingData.kommun || 'hemtjänsten';
      document.getElementById('homeTitle').textContent = `Välkommen till hemtjänsten i ${komunName}`;

      renderHomeView();
      attachHeaderEvents();
      attachSettingsEvents();
    });

    /* ---- LocalStorage ---- */
    function loadProgress() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
      } catch {
        return {};
      }
    }

    function saveProgress() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(progress));
    }

    /* ---- Progress calculations ---- */
    function getSectionProgress(section) {
      const total = section.checklist.length;
      const done = section.checklist.filter(item => progress[item.id]).length;
      return { done, total };
    }

    function getTotalProgress() {
      let totalDone = 0;
      let totalItems = 0;
      onboardingData.sections.forEach(sec => {
        const p = getSectionProgress(sec);
        totalDone += p.done;
        totalItems += p.total;
      });
      return { done: totalDone, total: totalItems };
    }

    /* ---- Render home ---- */
    function renderHomeView() {
      const { done, total } = getTotalProgress();
      const pct = total > 0 ? Math.round((done / total) * 100) : 0;

      document.getElementById('progressText').textContent = `Du har slutfört ${done} av ${total} moment`;
      const fill = document.getElementById('totalProgressFill');
      fill.style.width = pct + '%';
      document.getElementById('totalProgressBar').setAttribute('aria-valuenow', pct);

      const allDone = done === total && total > 0;
      document.getElementById('congratsBanner').classList.toggle('show', allDone);

      renderSectionCards(onboardingData.sections);
    }

    function renderSectionCards(sections) {
      const grid = document.getElementById('sectionsGrid');
      grid.innerHTML = '';

      sections.forEach(sec => {
        const { done, total } = getSectionProgress(sec);
        const pct = total > 0 ? Math.round((done / total) * 100) : 0;
        const isCompleted = done === total && total > 0;
        const originalIndex = onboardingData.sections.indexOf(sec);

        const card = document.createElement('button');
        card.className = 'section-card' + (isCompleted ? ' completed' : '');
        card.setAttribute('role', 'listitem');
        card.setAttribute('aria-label', `${sec.title}. ${done} av ${total} moment klara.`);
        card.innerHTML = `
          <span class="card-icon" aria-hidden="true">${sec.icon}</span>
          <div class="card-title">${sec.title}</div>
          <div class="card-summary">${sec.summary}</div>
          <div class="card-progress">
            <div class="card-progress-bar" role="presentation">
              <div class="card-progress-fill" style="width:${pct}%"></div>
            </div>
            <span class="card-progress-text">${done}/${total}</span>
          </div>
          <span class="card-done-badge">✓ Klart</span>
        `;
        card.addEventListener('click', () => openSection(originalIndex));
        grid.appendChild(card);
      });
    }

    /* ---- Render section detail ---- */
    function openSection(index) {
      currentSectionIndex = index;
      const sec = onboardingData.sections[index];
      const { done, total } = getSectionProgress(sec);
      const pct = total > 0 ? Math.round((done / total) * 100) : 0;

      const view = document.getElementById('viewSection');
      view.innerHTML = `
        <div class="section-header">
          <span class="section-header-icon" aria-hidden="true">${sec.icon}</span>
          <h2>${sec.title}</h2>
        </div>

        <div class="section-progress-bar" role="group" aria-label="Framsteg för detta avsnitt">
          <span class="section-progress-text" id="secProgText">${done} av ${total} klara</span>
          <div class="progress-bar-wrap" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="${pct}" aria-label="Framsteg">
            <div class="progress-bar-fill" id="secProgFill" style="width:${pct}%"></div>
          </div>
        </div>

        <div class="section-content">
          ${sec.content}
        </div>

        <div class="checklist-section">
          <div class="checklist-title">✅ Checklista</div>
          <div id="checklistItems">
            ${sec.checklist.map(item => `
              <div class="checklist-item">
                <input
                  type="checkbox"
                  id="chk_${item.id}"
                  ${progress[item.id] ? 'checked' : ''}
                  aria-checked="${progress[item.id] ? 'true' : 'false'}"
                >
                <label for="chk_${item.id}">
                  <span class="check-box" aria-hidden="true">
                    <span class="check-icon">✓</span>
                  </span>
                  <span class="check-text">${item.text}</span>
                </label>
              </div>
            `).join('')}
          </div>
          <div class="section-complete-msg" id="sectionCompleteMsg">
            🎉 Du har klarat alla moment i det här avsnittet!
          </div>
        </div>

        <div class="section-nav">
          ${index > 0 ? `<button class="btn-secondary" onclick="openSection(${index - 1})">← Föregående</button>` : ''}
          ${index < onboardingData.sections.length - 1
            ? `<button class="btn-primary" onclick="openSection(${index + 1})">Nästa avsnitt →</button>`
            : `<button class="btn-primary" onclick="showHome()">← Tillbaka till start</button>`
          }
        </div>
      `;

      // Update section complete msg
      if (done === total && total > 0) {
        document.getElementById('sectionCompleteMsg').classList.add('show');
      }

      // Attach checkbox events
      sec.checklist.forEach(item => {
        const chk = document.getElementById('chk_' + item.id);
        chk.addEventListener('change', () => {
          progress[item.id] = chk.checked;
          saveProgress();
          updateSectionProgress(sec);
          renderHomeView(); // update home silently
        });
      });

      // Switch views
      document.getElementById('viewHome').classList.remove('active');
      view.classList.add('active');
      document.getElementById('btnBack').style.display = 'flex';
      document.getElementById('headerTitle').textContent = sec.title;
      document.getElementById('headerSubtitle').textContent = `${sec.icon} Avsnitt ${index + 1} av ${onboardingData.sections.length}`;

      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function updateSectionProgress(sec) {
      const { done, total } = getSectionProgress(sec);
      const pct = total > 0 ? Math.round((done / total) * 100) : 0;
      const fillEl = document.getElementById('secProgFill');
      const textEl = document.getElementById('secProgText');
      if (fillEl) fillEl.style.width = pct + '%';
      if (textEl) textEl.textContent = `${done} av ${total} klara`;

      const msg = document.getElementById('sectionCompleteMsg');
      if (msg && done === total && total > 0) {
        msg.classList.add('show');
      }
    }

    /* ---- Navigation ---- */
    function showHome() {
      document.getElementById('viewSection').classList.remove('active');
      document.getElementById('viewSection').innerHTML = '';
      document.getElementById('viewHome').classList.add('active');
      document.getElementById('btnBack').style.display = 'none';
      document.getElementById('headerTitle').textContent = 'Hemtjänsten';
      document.getElementById('headerSubtitle').textContent = 'Onboarding för nyanställda';
      currentSectionIndex = -1;
      renderHomeView();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function attachHeaderEvents() {
      document.getElementById('btnBack').addEventListener('click', showHome);
    }

    /* ---- Settings ---- */
    function attachSettingsEvents() {
      const modal = document.getElementById('settingsModal');
      const btnSettings = document.getElementById('btnSettings');
      const btnClose = document.getElementById('btnCloseModal');
      const btnReset = document.getElementById('btnReset');

      btnSettings.addEventListener('click', () => {
        modal.classList.add('open');
        btnClose.focus();
      });

      btnClose.addEventListener('click', () => modal.classList.remove('open'));

      modal.addEventListener('click', e => {
        if (e.target === modal) modal.classList.remove('open');
      });

      document.addEventListener('keydown', e => {
        if (e.key === 'Escape' && modal.classList.contains('open')) {
          modal.classList.remove('open');
          btnSettings.focus();
        }
      });

      btnReset.addEventListener('click', () => {
        if (confirm('Är du säker? Det här nollställer alla kryssade moment.')) {
          progress = {};
          saveProgress();
          modal.classList.remove('open');
          if (currentSectionIndex >= 0) {
            openSection(currentSectionIndex);
          } else {
            renderHomeView();
          }
        }
      });
    }

    /* ---- Search ---- */
    document.addEventListener('DOMContentLoaded', () => {
      const input = document.getElementById('searchInput');
      input.addEventListener('input', () => {
        const q = input.value.trim().toLowerCase();
        if (!q) {
          document.getElementById('noResults').style.display = 'none';
          renderSectionCards(onboardingData.sections);
          return;
        }
        const filtered = onboardingData.sections.filter(sec => {
          return (
            sec.title.toLowerCase().includes(q) ||
            sec.summary.toLowerCase().includes(q) ||
            sec.content.toLowerCase().includes(q) ||
            sec.checklist.some(item => item.text.toLowerCase().includes(q))
          );
        });
        if (filtered.length === 0) {
          document.getElementById('noResults').style.display = 'block';
          document.getElementById('noResults').textContent = `Inga träffar för "${input.value}"`;
          document.getElementById('sectionsGrid').innerHTML = '';
        } else {
          document.getElementById('noResults').style.display = 'none';
          renderSectionCards(filtered);
        }
      });
    });
  </script>
</body>
</html>
