<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prompt-labb för lärare åk 1–6</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue:    #2563eb;
      --blue-lt: #dbeafe;
      --green:   #16a34a;
      --green-lt:#dcfce7;
      --amber:   #d97706;
      --amber-lt:#fef3c7;
      --purple:  #7c3aed;
      --purple-lt:#ede9fe;
      --rose:    #e11d48;
      --rose-lt: #ffe4e6;
      --teal:    #0d9488;
      --teal-lt: #ccfbf1;
      --orange:  #ea580c;
      --orange-lt:#ffedd5;
      --pink:    #db2777;
      --pink-lt: #fce7f3;
      --slate:   #475569;
      --bg:      #f1f5f9;
      --card:    #ffffff;
      --border:  #e2e8f0;
      --text:    #0f172a;
      --muted:   #64748b;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── HERO ── */
    .hero {
      background: linear-gradient(135deg, #065f46 0%, #059669 40%, #0d9488 100%);
      color: #fff;
      padding: 56px 24px 48px;
      text-align: center;
    }
    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,.15);
      border: 1px solid rgba(255,255,255,.25);
      border-radius: 999px;
      padding: 4px 14px;
      font-size: .8rem;
      font-weight: 600;
      letter-spacing: .05em;
      text-transform: uppercase;
      margin-bottom: 20px;
    }
    .hero h1 {
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      font-weight: 800;
      line-height: 1.2;
      margin-bottom: 16px;
    }
    .hero p {
      font-size: 1.1rem;
      opacity: .85;
      max-width: 580px;
      margin: 0 auto 28px;
      line-height: 1.6;
    }
    .stats {
      display: flex;
      justify-content: center;
      gap: 32px;
      flex-wrap: wrap;
    }
    .stat { text-align: center; }
    .stat-num { font-size: 1.9rem; font-weight: 800; }
    .stat-lbl { font-size: .78rem; opacity: .75; text-transform: uppercase; letter-spacing: .05em; }

    /* ── MAIN LAYOUT ── */
    .main { max-width: 1200px; margin: 0 auto; padding: 36px 20px 60px; }

    /* ── TOOLBAR ── */
    .toolbar {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px 24px;
      margin-bottom: 28px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .search-row { position: relative; }
    .search-row svg {
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      color: var(--muted); pointer-events: none;
    }
    #search {
      width: 100%;
      padding: 11px 14px 11px 42px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: .95rem;
      background: var(--bg);
      outline: none;
      transition: border-color .15s;
    }
    #search:focus { border-color: var(--green); }

    .filter-row { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
    .filter-label { font-size: .8rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; margin-right: 4px; }

    .chip {
      padding: 5px 14px;
      border-radius: 999px;
      border: 1.5px solid var(--border);
      background: var(--card);
      font-size: .83rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .15s;
      color: var(--slate);
      white-space: nowrap;
    }
    .chip:hover { border-color: var(--green); color: var(--green); }
    .chip.active { background: var(--green); border-color: var(--green); color: #fff; }

    /* ── RESULT COUNT ── */
    .result-count {
      font-size: .88rem;
      color: var(--muted);
      margin-bottom: 18px;
    }
    .result-count span { font-weight: 700; color: var(--text); }

    /* ── GRID ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 20px;
    }

    /* ── CARD ── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      transition: box-shadow .2s, transform .2s;
    }
    .card:hover { box-shadow: 0 8px 32px rgba(0,0,0,.1); transform: translateY(-2px); }

    .card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
    .card-tags { display: flex; flex-wrap: wrap; gap: 6px; }
    .tag {
      padding: 3px 10px;
      border-radius: 999px;
      font-size: .72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .04em;
      white-space: nowrap;
    }

    /* difficulty */
    .diff-grund  { background: var(--green-lt);  color: var(--green);  }
    .diff-mellan { background: var(--amber-lt);  color: var(--amber);  }
    .diff-avance { background: var(--rose-lt);   color: var(--rose);   }

    /* subject */
    .subj-svenska    { background: var(--blue-lt);   color: var(--blue);   }
    .subj-matematik  { background: var(--rose-lt);   color: var(--rose);   }
    .subj-so         { background: var(--amber-lt);  color: var(--amber);  }
    .subj-no         { background: var(--green-lt);  color: var(--green);  }
    .subj-engelska   { background: #e0e7ff;          color: #4338ca;       }
    .subj-bedömning  { background: var(--purple-lt); color: var(--purple); }
    .subj-planering  { background: var(--teal-lt);   color: var(--teal);   }
    .subj-elevhälsa  { background: var(--pink-lt);   color: var(--pink);   }
    .subj-sva        { background: var(--orange-lt); color: var(--orange); }
    .subj-bild       { background: #fff7ed;          color: #c2410c;       }
    .subj-musik      { background: #f0fdf4;          color: #166534;       }
    .subj-idrott     { background: #ecfdf5;          color: #065f46;       }
    .subj-slöjd      { background: #fdf4ff;          color: #7e22ce;       }

    .card h3 { font-size: 1rem; font-weight: 700; line-height: 1.4; }
    .card-desc { font-size: .88rem; color: var(--muted); line-height: 1.6; flex: 1; }

    .card-footer { display: flex; flex-direction: column; gap: 10px; }
    .prompt-preview {
      background: var(--bg);
      border-left: 3px solid var(--green);
      border-radius: 0 8px 8px 0;
      padding: 10px 12px;
      font-size: .8rem;
      color: var(--slate);
      line-height: 1.55;
      font-style: italic;
      max-height: 90px;
      overflow: hidden;
      position: relative;
    }
    .prompt-preview::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 28px;
      background: linear-gradient(transparent, var(--bg));
    }

    .btn-copy {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      padding: 9px 16px;
      border-radius: 10px;
      border: none;
      background: var(--green);
      color: #fff;
      font-size: .86rem;
      font-weight: 700;
      cursor: pointer;
      transition: background .15s, transform .1s;
    }
    .btn-copy:hover { background: #15803d; }
    .btn-copy:active { transform: scale(.97); }
    .btn-copy.copied { background: var(--teal); }

    .no-results {
      grid-column: 1/-1;
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }
    .no-results svg { opacity: .3; margin-bottom: 12px; }

    @media (max-width: 600px) {
      .stats { gap: 20px; }
      .hero { padding: 40px 16px 36px; }
      .main { padding: 24px 14px 48px; }
    }
  </style>
</head>
<body>

<header class="hero">
  <div class="hero-badge">
    <svg width="12" height="12" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg>
    Lgr22-anpassat • Åk 1–6
  </div>
  <h1>Prompt-labb för lärare i<br>lågstadiet och mellanstadiet</h1>
  <p>Välkurerade AI-prompts för undervisning, bedömning och planering – anpassade till Lgr22 och svenska grundskolans åk 1–6.</p>
  <div class="stats">
    <div class="stat"><div class="stat-num" id="totalCount">50</div><div class="stat-lbl">Prompts</div></div>
    <div class="stat"><div class="stat-num">13</div><div class="stat-lbl">Ämnen</div></div>
    <div class="stat"><div class="stat-num">3</div><div class="stat-lbl">Nivåer</div></div>
  </div>
</header>

<main class="main">
  <div class="toolbar">
    <div class="search-row">
      <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="search" placeholder="Sök prompt, ämne eller nyckelord…">
    </div>
    <div class="filter-row">
      <span class="filter-label">Ämne</span>
      <button class="chip active" data-filter="subject" data-value="alla">Alla ämnen</button>
      <button class="chip" data-filter="subject" data-value="svenska">Svenska</button>
      <button class="chip" data-filter="subject" data-value="matematik">Matematik</button>
      <button class="chip" data-filter="subject" data-value="so">SO</button>
      <button class="chip" data-filter="subject" data-value="no">NO</button>
      <button class="chip" data-filter="subject" data-value="engelska">Engelska</button>
      <button class="chip" data-filter="subject" data-value="sva">SVA</button>
      <button class="chip" data-filter="subject" data-value="bedömning">Bedömning</button>
      <button class="chip" data-filter="subject" data-value="planering">Planering</button>
      <button class="chip" data-filter="subject" data-value="elevhälsa">Elevhälsa</button>
    </div>
    <div class="filter-row">
      <span class="filter-label">Nivå</span>
      <button class="chip active" data-filter="diff" data-value="alla">Alla nivåer</button>
      <button class="chip" data-filter="diff" data-value="grund">Grundnivå</button>
      <button class="chip" data-filter="diff" data-value="mellan">Mellannivå</button>
      <button class="chip" data-filter="diff" data-value="avance">Avancerad</button>
    </div>
  </div>

  <p class="result-count">Visar <span id="showCount">50</span> av <span id="ofCount">50</span> prompts</p>
  <div class="grid" id="grid"></div>
</main>

<script>
const prompts = [

  // ── SVENSKA ──
  {
    subject: "svenska", diff: "grund",
    title: "Skapa en högläsningsplanering med samtalsfrågor",
    desc: "Förbered en högläsningslektion med fokus på förförståelse, läsning och samtal.",
    prompt: "Jag ska högläsa [BOKTITEL] för åk [1/2/3]. Hjälp mig planera lektionen: (1) Tre aktiverande frågor innan läsningen (förförståelse). (2) Tre stoppunkter i texten med diskussionsfrågor. (3) Tre avslutande samtalsfrågor om budskap och känslor. Anpassa språket och frågorna till barnens ålder."
  },
  {
    subject: "svenska", diff: "grund",
    title: "Generera en stavningsövning med temaord",
    desc: "Skapa en varierad stavningsövning kopplad till ett tema eleverna arbetar med.",
    prompt: "Skapa en stavningsövning för åk [2/3] med 12 ord inom temat [TEMA, t.ex. djur, årstider, mat]. Inkludera: (1) Ordlista med bildstöd beskrivet i text. (2) Tre olika övningsformat: skriv ordet, välj rätt stavning, skriv mening. (3) En enkel utmaningsuppgift för snabba elever. Ord ska vara anpassade till kursplanens centrala innehåll."
  },
  {
    subject: "svenska", diff: "grund",
    title: "Skriv ett modellexempel på en berättande text",
    desc: "Visa eleverna hur en berättelse ser ut med tydlig struktur – som stöd för eget skrivande.",
    prompt: "Skriv ett modellexempel på en kort berättande text (150–200 ord) för åk [2/3] med tydlig struktur: inledning, händelse, vändpunkt och avslutning. Temat är [TEMA]. Markera strukturdelarna med fetstil eller parenteser så att eleverna tydligt ser uppbyggnaden. Avsluta med tre skrivuppmaningar eleverna kan använda för sin egen berättelse."
  },
  {
    subject: "svenska", diff: "mellan",
    title: "Arbeta med texttyper – instruktioner och faktatext",
    desc: "Jämför två texttyper och skapa skrivuppgifter som tränar genrekunskap.",
    prompt: "Planera en lektionsserie i åk 4–5 om texttypen [INSTRUKTIONSTEXT/FAKTATEXT]. Inkludera: ett modellexempel (100 ord) som eleverna analyserar med fokus på syfte, struktur och språkliga drag, tre analysfrågor, en paruppgift där eleverna skriver en egen text i genren, och bedömningsaspekter kopplade till Lgr22 svenska."
  },
  {
    subject: "svenska", diff: "mellan",
    title: "Skapa diskussionsfrågor till en bilderbok",
    desc: "Djupläs en bilderbok med Socratiska frågor på tre kognitiva nivåer.",
    prompt: "Bilderboken vi läser är [TITEL] av [FÖRFATTARE]. Skapa 9 diskussionsfrågor för åk 3–5: 3 återberättande (vad hände?), 3 tolkande (vad menar berättaren?), 3 värderande (vad tycker du och varför?). Lägg till ett förslag på hur klassen kan dramatisera en scen ur boken."
  },
  {
    subject: "svenska", diff: "avance",
    title: "Designa ett skrivprojekt med verkligt syfte",
    desc: "Skapa ett autentiskt skrivprojekt där eleverna skriver för en riktig publik.",
    prompt: "Designa ett 3-veckors skrivprojekt för åk 5–6 med genren [GENRE, t.ex. insändare, recension, instruktionsbok]. Eleven ska skriva för en verklig publik (t.ex. skolans anslagstavla, klassens blogg). Inkludera: planeringsschema, scaffolding-mallar, kamratrespons-moment, revisionsuppgift och bedömningskriterier E/C/A enligt Lgr22."
  },

  // ── MATEMATIK ──
  {
    subject: "matematik", diff: "grund",
    title: "Förklara ett taluppfattningsbegrepp konkret",
    desc: "Gör ett abstrakt talbegreppp konkret med föremål och lekar som låg- och mellanstadiebarn känner igen.",
    prompt: "Förklara [BEGREPP, t.ex. tallinjen, addition, bråk] för elever i åk [1/2/3] med: (1) en konkret handling med föremål (klossar, äpplen, fingrar), (2) en enkel lek eller rörelseövning, (3) ett räkneexempel på ett bord, (4) en enkel fråga eleven kan ställa till kompisen. Max 120 ord."
  },
  {
    subject: "matematik", diff: "grund",
    title: "Skapa tabellträning med variation",
    desc: "Generera varierade övningar för att befästa en multiplikationstabell.",
    prompt: "Skapa fem varierade övningar för att träna [X]-tabellen med elever i åk 3–4: (1) Klassisk räkning upp och ner. (2) Hitta-felen (tre fel i en lista). (3) Fyll i tomma rutor i ett mönster. (4) Problemlösning med tabellen i vardagskontext. (5) En tävlingslek för par. Varje övning ska ta 3–5 minuter."
  },
  {
    subject: "matematik", diff: "mellan",
    title: "Problemlösning med öppna uppgifter",
    desc: "Generera öppna matematikuppgifter som engagerar och utmanar på flera nivåer.",
    prompt: "Skapa 4 öppna matematikuppgifter för åk 4–5 inom området [OMRÅDE, t.ex. mätning, geometri, statistik]. Varje uppgift ska: ha mer än ett rätt svar eller lösningsväg, gå att lösa på minst tre sätt (konkret, ritning, symboler), kopplas till vardagen. Lägg till diskussionsfrågor för helklassgenomgång och markera vilket kunskapskrav i Lgr22 som tränas."
  },
  {
    subject: "matematik", diff: "mellan",
    title: "Skapa en matematiklektion med EPA-struktur",
    desc: "Designa en lektion där eleverna arbetar enskilt, i par och i grupp (EPA).",
    prompt: "Designa en 60-minuterslektion i matematik för åk [4/5/6] om [INNEHÅLL] med EPA-strukturen: Enskilt (10 min) – individuell uppgift, Par (15 min) – jämför lösningar och diskutera, Alla (20 min) – helklass med lärarledd diskussion, Fördjupning (10 min) – utmaningsuppgift, Avslut (5 min) – exit ticket. Ange lärarens frågor och hur du differentierar."
  },
  {
    subject: "matematik", diff: "avance",
    title: "Designa ett matematikprojekt med statistik",
    desc: "Skapa ett undersökande projekt där elever samlar och analyserar egen data.",
    prompt: "Designa ett 2-veckors statistikprojekt för åk 5–6. Eleverna ska: formulera en fråga, samla in data (enkät eller mätning), sammanställa i tabell och diagram, dra slutsatser och presentera. Ange: stödmaterial per steg, hur du bedömer processen och produkten (E/C/A enligt Lgr22), och tre förslag på undersökningsfrågor som engagerar 10–12-åringar."
  },

  // ── SO ──
  {
    subject: "so", diff: "grund",
    title: "Introducera ett SO-begrepp med bild och berättelse",
    desc: "Gör ett abstrakt samhällsbegrepp konkret och begripligt för yngre elever.",
    prompt: "Förklara begreppet [SO-BEGREPP, t.ex. demokrati, handel, migrering] för elever i åk [2/3] med: (1) en kort berättelse om ett barn i barnets vardag som illustrerar begreppet, (2) tre konkreta exempel från Sverige idag, (3) en enkel diskussionsfråga, (4) ett förslag på hur du kan visa begreppet med en bild eller teckning. Max 150 ord."
  },
  {
    subject: "so", diff: "grund",
    title: "Planera ett närmiljöprojekt",
    desc: "Ta ut undervisningen i närmiljön – skapa ett undersökande projekt om lokalsamhället.",
    prompt: "Hjälp mig planera ett 2-veckors närmiljöprojekt för åk [2/3] med temat [TEMA, t.ex. vår by, naturen runt skolan, yrken i samhället]. Inkludera: syfte och frågeställningar, ett studiebesök eller utegång med uppgifter, hur eleverna dokumenterar (foto, teckning, text), en enkel presentation för klassen och koppling till Lgr22 SO och NO."
  },
  {
    subject: "so", diff: "mellan",
    title: "Skapa en tidslinjeaktivitet för historieundervisning",
    desc: "Bygg en interaktiv tidslinjeövning om ett historiskt skeende anpassat för mellanstadiet.",
    prompt: "Skapa en tidslinjeövning om [HISTORISKT SKEENDE] för åk 4–5. Ge mig: 8 nyckelårtalet med korta förklaringar (max 20 ord/händelse), tre diskussionsfrågor om orsak och verkan, en parövning där eleverna sorterar kort i rätt ordning, och ett tips på hur eleverna skapar en digital tidslinje. Anpassa språket till 10-11-åriga elever."
  },
  {
    subject: "so", diff: "mellan",
    title: "Rollspel om en historisk eller samhällelig situation",
    desc: "Bygg ett enkelt rollspel som sätter eleverna i en historisk eller aktuell situation.",
    prompt: "Designa ett rollspel för åk 4–6 kring situationen: [SITUATION, t.ex. ett tingsting på vikingatiden, ett kommunfullmäktigemöte, en forntida marknadsplats]. Ge mig: 4–5 enkla roller med kort beskrivning, hur läraren introducerar rollspelet, tre diskussionsfrågor efteråt och en koppling till kunskapskraven i SO Lgr22."
  },
  {
    subject: "so", diff: "avance",
    title: "Designa ett samhällsvetenskapligt undersökningsarbete",
    desc: "Skapa ett projektarbete i SO där eleverna väljer ett eget fokusområde.",
    prompt: "Designa ett 3-veckors undersökningsarbete i SO för åk 6 med temat [TEMA]. Inkludera: hur eleverna väljer och avgränsar sin frågeställning, vilka källor de ska använda (minst primär + sekundär källa), hållpunkter med lärarcheckin, presentationsform (poster, digital presentation eller kortfilm), bedömningsmatris E/C/A enligt Lgr22 och stöd för elever med läs- och skrivsvårigheter."
  },

  // ── NO ──
  {
    subject: "no", diff: "grund",
    title: "Planera en naturupplevelselektion utomhus",
    desc: "Ta ut NO-undervisningen och gör barnen nyfikna på naturen runt skolan.",
    prompt: "Planera en 60-minuters utomhuslektion i NO för åk [1/2/3] med temat [TEMA, t.ex. insekter, växter, årstider]. Inkludera: introduktion i klassrummet (10 min), utomhusuppgifter (30 min) med konkreta observationer, dokumentation (10 min) med teckning eller foto, avslutande samtal (10 min). Ange säkerhetsregler och koppling till Lgr22 NO."
  },
  {
    subject: "no", diff: "grund",
    title: "Skapa ett enkelt labprotokoll för lågstadiet",
    desc: "Gör naturvetenskap konkret med ett elevvänligt labprotokoll anpassat för yngre elever.",
    prompt: "Skriv ett labprotokoll för åk [2/3] för undersökningen: [UNDERSÖKNING, t.ex. vad sjunker/flyter, hur frön gror]. Inkludera: frågeord (Vad tror jag?), material, steg-för-steg med bilder beskrivna i text, en enkel observationstabell med symboler (☺/☹/?) och tre avslutningsfrågor. Språket ska vara lättläst med korta meningar."
  },
  {
    subject: "no", diff: "mellan",
    title: "Skapa ett NO-projektarbete med experimentdesign",
    desc: "Låt eleverna designa och genomföra ett eget enkelt experiment.",

// ── RENDER ──
const grid = document.getElementById('grid');
const searchInput = document.getElementById('search');
const showCount = document.getElementById('showCount');
const ofCount = document.getElementById('ofCount');
const totalCount = document.getElementById('totalCount');

totalCount.textContent = prompts.length;
ofCount.textContent = prompts.length;

let activeSubject = 'alla';
let activeDiff = 'alla';

const subjectMap = {
  svenska:'Svenska', matematik:'Matematik', so:'SO', no:'NO',
  engelska:'Engelska', sva:'SVA', bedömning:'Bedömning', planering:'Planering',
  elevhälsa:'Elevhälsa', bild:'Bild', musik:'Musik', idrott:'Idrott & hälsa', slöjd:'Slöjd'
};
const subjectClass = s => 'subj-' + s;
const diffLabel = d => ({grund:'Grundnivå', mellan:'Mellannivå', avance:'Avancerad'}[d] || d);

function render() {
  const q = searchInput.value.toLowerCase().trim();
  const filtered = prompts.filter(p => {
    const matchSub  = activeSubject === 'alla' || p.subject === activeSubject;
    const matchDiff = activeDiff === 'alla' || p.diff === activeDiff;
    const matchQ    = !q || [p.title, p.desc, p.subject, p.prompt].join(' ').toLowerCase().includes(q);
    return matchSub && matchDiff && matchQ;
  });

  showCount.textContent = filtered.length;

  if (!filtered.length) {
    grid.innerHTML = `<div class="no-results">
      <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <p>Inga prompts matchade din sökning. Prova ett annat ord eller filter.</p>
    </div>`;
    return;
  }

  grid.innerHTML = filtered.map(p => `
    <article class="card">
      <div class="card-top">
        <div class="card-tags">
          <span class="tag ${subjectClass(p.subject)}">${subjectMap[p.subject] || p.subject}</span>
          <span class="tag diff-${p.diff}">${diffLabel(p.diff)}</span>
        </div>
      </div>
      <h3>${p.title}</h3>
      <p class="card-desc">${p.desc}</p>
      <div class="card-footer">
        <div class="prompt-preview">${p.prompt}</div>
        <button class="btn-copy" data-prompt="${encodeURIComponent(p.prompt)}">
          <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          Kopiera prompt
        </button>
      </div>
    </article>
  `).join('');
}

grid.addEventListener('click', e => {
  const btn = e.target.closest('.btn-copy');
  if (!btn) return;
  navigator.clipboard.writeText(decodeURIComponent(btn.dataset.prompt)).then(() => {
    btn.classList.add('copied');
    btn.innerHTML = `<svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5"/></svg> Kopierad!`;
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.innerHTML = `<svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Kopiera prompt`;
    }, 2000);
  });
});

document.querySelectorAll('[data-filter]').forEach(chip => {
  chip.addEventListener('click', () => {
    const type = chip.dataset.filter;
    document.querySelectorAll(`[data-filter="${type}"]`).forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    if (type === 'subject') activeSubject = chip.dataset.value;
    else activeDiff = chip.dataset.value;
    render();
  });
});

searchInput.addEventListener('input', render);
render();
</script>
