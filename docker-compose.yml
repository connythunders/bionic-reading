version: '3.8'

services:
  # PostgreSQL Databas
  postgres:
    image: postgres:15-alpine
    container_name: quiz_postgres
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
      POSTGRES_DB: quizdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - quiz_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Node.js Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: quiz_backend
    environment:
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: quizdb
      DB_USER: root
      DB_PASSWORD: root
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - quiz_network
    restart: unless-stopped

  # NGINX Frontend
  nginx:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: quiz_nginx
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - quiz_network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  quiz_network:
    driver: bridge
